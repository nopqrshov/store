<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900">Settings</h1>
        
        <div class="glass-card mt-6">
          <h2 class="text-xl font-bold">Email Verification</h2>
          <div id="emailVerificationStatus" class="mt-2 text-sm">
            <span id="verifyStatusText">Loading...</span>
          </div>
          <button id="verifyEmailBtn" class="btn-primary mt-3 text-sm py-2 px-4">
            <i class="fas fa-envelope"></i> Send Verification Email
          </button>
          <hr class="my-6" />
          
          <h2 class="text-xl font-bold">Change Password</h2>
          <form id="changePasswordForm" class="mt-4 space-y-3">
            <input type="password" id="currentPassword" placeholder="Current Password" class="form-input" required />
            <input type="password" id="newPassword" placeholder="New Password" class="form-input" required />
            <button type="submit" class="btn-primary">Update Password</button>
          </form>
          <hr class="my-6" />
          <button onclick="deleteAccount()" class="btn-danger w-full">Delete Account</button>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- অথ মডাল (ফরগট পাসওয়ার্ড সহ) -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-2 text-sm text-center">
        <a href="#" onclick="window.showResetPasswordModal()" class="text-blue-600 hover:underline">
          <i class="fas fa-key"></i> Forgot Password?
        </a>
      </p>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, signOut, reauthenticateWithCredential, EmailAuthProvider, updatePassword, deleteUser, onAuthStateChanged, doc, getDoc, signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc, deleteDoc, sendEmailVerification } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, renderCartSidebar, setLoading } from './components.js';

    renderNavbar();
    renderFooter();
    renderCartSidebar();
    updateCartBadge();

    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ===== অথ মডাল =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          // ✅ ভেরিফিকেশন চেক সরানো হয়েছে
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          // ✅ সাইন আপের সময় ইমেইল ভেরিফিকেশন পাঠানো হচ্ছে না (শুধু সেটিংসে অপশন থাকবে)
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ Account created! You can now sign in.', 'success');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      updateNavbarAuth(user, userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0]);
      
      // ===== ইমেইল ভেরিফিকেশন স্ট্যাটাস আপডেট =====
      const statusText = document.getElementById('verifyStatusText');
      const verifyBtn = document.getElementById('verifyEmailBtn');
      if (user.emailVerified) {
        statusText.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Your email is verified.</span>';
        verifyBtn.style.display = 'none';
      } else {
        statusText.innerHTML = '<span class="text-orange-500"><i class="fas fa-exclamation-triangle"></i> Your email is not verified. Click below to send verification link.</span>';
        verifyBtn.style.display = 'inline-flex';
      }
    });

    // ===== ভেরিফিকেশন ইমেইল পাঠান =====
    document.getElementById('verifyEmailBtn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) return showToast('You are not logged in.', 'error');
      if (user.emailVerified) {
        showToast('Your email is already verified.', 'warning');
        return;
      }
      setLoading(document.getElementById('verifyEmailBtn'), true);
      try {
        await sendEmailVerification(user);
        showToast('✅ Verification email sent! Check your inbox.', 'success');
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      } finally {
        setLoading(document.getElementById('verifyEmailBtn'), false);
      }
    });

    // ===== পাসওয়ার্ড পরিবর্তন =====
    const changePasswordForm = document.getElementById('changePasswordForm');
    const passBtn = changePasswordForm.querySelector('button[type="submit"]');
    changePasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('currentPassword').value;
      const newPass = document.getElementById('newPassword').value;
      if (!current || !newPass) return showToast('Please fill all fields', 'error');
      const user = auth.currentUser;
      if (!user) return showToast('You are not logged in', 'error');
      setLoading(passBtn, true, 'Update Password');
      try {
        const credential = EmailAuthProvider.credential(user.email, current);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, newPass);
        showToast('✅ Password updated', 'success');
        changePasswordForm.reset();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      } finally {
        setLoading(passBtn, false);
      }
    });

    // ===== অ্যাকাউন্ট ডিলিট =====
    window.deleteAccount = async () => {
      if (!confirm('Are you sure you want to delete your account? This action is irreversible.')) return;
      const user = auth.currentUser;
      if (!user) return showToast('You are not logged in', 'error');
      try {
        await deleteDoc(doc(db, 'users', user.uid));
        await deleteUser(user);
        showToast('✅ Account deleted', 'success');
        window.location.href = 'index.html';
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    window.handleLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
