<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix My Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    /* আপনার স্টাইল (index থেকে কপি) – সংক্ষেপে */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #f2f4f7; color: #1c1c1e; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.6); }
    .btn-primary { background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; padding:12px 28px; border-radius:60px; font-weight:600; border:none; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.35); }
    .gradient-text { background: linear-gradient(135deg,#007AFF,#AF52DE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .form-input { width:100%; padding:14px 18px; border:1.5px solid rgba(60,60,67,0.08); border-radius:14px; font-size:1rem; background:rgba(255,255,255,0.8); }
    .form-input:focus { outline:none; border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.08); }
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; background:white; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.1); min-width:200px; padding:8px 0; border:1px solid rgba(0,0,0,0.04); z-index:100; }
    .dropdown-menu a { display:block; padding:10px 20px; color:#1c1c1e; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .dropdown-menu a:hover { background:#f0f0f5; }
    .dropdown-menu.show { display:block; }
    .profile-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#007AFF,#5856D6); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; }
    .nav-link { position:relative; font-weight:500; color:#3a3a3c; transition:0.2s; cursor:pointer; text-decoration:none; }
    .nav-link:hover { color:#007AFF; }
    .social-icon { display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:60px; background:rgba(255,255,255,0.8); backdrop-filter:blur(4px); color:#3a3a3c; text-decoration:none; border:1px solid rgba(60,60,67,0.08); transition:0.3s; }
    .social-icon:hover { background:#007AFF; color:#fff; transform:translateY(-4px); box-shadow:0 8px 20px rgba(0,122,255,0.2); border-color:#007AFF; }
    #toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 100%;
    }
    .toast {
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      font-size: 0.95rem;
      font-weight: 500;
      color: #1c1c1e;
      transform: translateX(calc(100% + 30px));
      animation: slideIn 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.success { border-left: 4px solid #34C759; }
    .toast.error { border-left: 4px solid #FF3B30; }
    .toast.warning { border-left: 4px solid #FF9500; }
    .toast i { font-size: 1.2rem; }
    .toast.success i { color: #34C759; }
    .toast.error i { color: #FF3B30; }
    .toast.warning i { color: #FF9500; }
    @keyframes slideIn { to { transform: translateX(0); } }
    .toast.hide { animation: slideOut 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes slideOut { to { transform: translateX(calc(100% + 30px)); opacity: 0; } }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="pt-28 pb-16 px-6 max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900">Fix My Website</h1>
    <p class="text-gray-500 mt-2">Describe your issue in detail. We'll get back to you within 24 hours.</p>
    <form id="fixForm" class="mt-8 space-y-5">
      <!-- আপনার ফর্ম (আগের মতো) -->
      <div>
        <label class="block text-sm font-semibold text-gray-700">Your Name *</label>
        <input type="text" id="fixName" required class="form-input" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700">Email *</label>
        <input type="email" id="fixEmail" required class="form-input" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700">Phone</label>
        <input type="tel" id="fixPhone" class="form-input" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700">Website URL (if any)</label>
        <input type="url" id="fixUrl" class="form-input" placeholder="https://example.com" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700">Describe the problem *</label>
        <textarea id="fixProblem" rows="5" required class="form-input resize-y" placeholder="What's broken? Slow speed? Error messages?"></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700">Screenshot / Image (Google Drive link)</label>
        <input type="text" id="fixImageLink" class="form-input" placeholder="Paste your Google Drive share link here" />
        <p class="text-xs text-gray-400 mt-1">Upload image to Google Drive, get shareable link, and paste here.</p>
      </div>
      <button type="submit" class="btn-primary w-full justify-center">
        <i class="fas fa-paper-plane"></i> Submit Fix Request
      </button>
      <div id="fixFeedback" class="hidden text-sm font-medium p-4 rounded-xl"></div>
    </form>
  </section>

  <!-- অথ মডাল -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  <script type="module">
    // ✅ ফিক্স: createUserWithEmailAndPassword (টাইপো ঠিক)
    import { auth, db, collection, addDoc, serverTimestamp, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, doc, setDoc, getDoc } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth } from './components.js';

    renderNavbar();
    renderFooter();

    // TOAST, ফর্ম সাবমিট, অথ মডাল – আগের কোড ঠিক রাখুন
    // শুধু onAuthStateChanged-এ updateNavbarAuth ব্যবহার করুন

    onAuthStateChanged(auth, async (user) => {
      let name = null;
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      }
      updateNavbarAuth(user, name);
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ লগআউট সফল', 'success');
    };

    // বাকি ফাংশন (showToast, openAuthModal, closeAuthModal, fixForm submit) আগের মতো
  </script>
</body>
</html>
