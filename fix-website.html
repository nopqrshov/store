<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix My Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900">Fix My Website</h1>
        <p class="text-gray-500 mt-2">Describe your issue in detail. We'll get back to you within 24 hours.</p>
        <form id="fixForm" class="mt-8 space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700">Your Name *</label>
            <input type="text" id="fixName" required class="form-input" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700">Email *</label>
            <input type="email" id="fixEmail" required class="form-input" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700">Phone</label>
            <input type="tel" id="fixPhone" class="form-input" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700">Website URL (if any)</label>
            <input type="url" id="fixUrl" class="form-input" placeholder="https://example.com" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700">Describe the problem *</label>
            <textarea id="fixProblem" rows="5" required class="form-input resize-y" placeholder="What's broken? Slow speed? Error messages?"></textarea>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700">Screenshot / Image (Google Drive link)</label>
            <input type="text" id="fixImageLink" class="form-input" placeholder="Paste your Google Drive share link here" />
            <p class="text-xs text-gray-400 mt-1">Upload image to Google Drive, get shareable link, and paste here.</p>
          </div>
          <button type="submit" class="btn-primary w-full justify-center">
            <i class="fas fa-paper-plane"></i> Submit Fix Request
          </button>
          <div id="fixFeedback" class="hidden text-sm font-medium p-4 rounded-xl"></div>
        </form>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- অথ মডাল -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db, collection, addDoc, serverTimestamp, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, doc, setDoc, getDoc } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge } from './components.js';

    renderNavbar();
    renderFooter();
    updateCartBadge();

    // ===== TOAST =====
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, 4500);
    };

    // ===== ফর্ম সাবমিট =====
    document.getElementById('fixForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('fixName').value.trim();
      const email = document.getElementById('fixEmail').value.trim();
      const phone = document.getElementById('fixPhone').value.trim();
      const url = document.getElementById('fixUrl').value.trim();
      const problem = document.getElementById('fixProblem').value.trim();
      const imageLink = document.getElementById('fixImageLink').value.trim();
      const feedback = document.getElementById('fixFeedback');

      if (!name || !email || !problem) {
        feedback.className = 'block text-sm font-medium p-4 rounded-xl bg-red-50 text-red-600 border border-red-200';
        feedback.textContent = 'দয়া করে নাম, ইমেইল ও সমস্যা বিবরণ দিন।';
        showToast('⚠️ দয়া করে নাম, ইমেইল ও সমস্যা বিবরণ দিন।', 'error');
        return;
      }

      try {
        await addDoc(collection(db, 'fixRequests'), {
          name, email, phone, url, problem, imageLink,
          status: 'pending',
          timestamp: serverTimestamp(),
          read: false
        });
        feedback.className = 'block text-sm font-medium p-4 rounded-xl bg-emerald-50 text-emerald-600 border border-emerald-200';
        feedback.textContent = '✅ আপনার রিকোয়েস্ট সফলভাবে জমা হয়েছে। শীঘ্রই যোগাযোগ করা হবে।';
        showToast('✅ আপনার রিকোয়েস্ট সফলভাবে জমা হয়েছে!', 'success');
        document.getElementById('fixForm').reset();
        setTimeout(() => feedback.className = 'hidden', 8000);
      } catch (error) {
        feedback.className = 'block text-sm font-medium p-4 rounded-xl bg-red-50 text-red-600 border border-red-200';
        feedback.textContent = '⚠️ কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।';
        showToast('⚠️ কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।', 'error');
        console.error(error);
      }
    });

    // ===== AUTH =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ সাইন ইন সফল!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ অ্যাকাউন্ট তৈরি হয়েছে!', 'success');
        }
        closeAuthModal();
        document.getElementById('authForm').reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      }
    });

    // ===== AUTH STATE =====
    onAuthStateChanged(auth, async (user) => {
      let name = null;
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      }
      updateNavbarAuth(user, name);
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ লগআউট সফল', 'success');
    };
  </script>
</body>
</html>
