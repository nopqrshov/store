<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    /* একই স্টাইল (সংক্ষেপে) – উপরের ফাইল থেকে কপি করুন */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #f2f4f7; color: #1c1c1e; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.6); }
    .btn-primary { background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; padding:12px 28px; border-radius:60px; font-weight:600; border:none; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.35); }
    .gradient-text { background: linear-gradient(135deg,#007AFF,#AF52DE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-link { position:relative; font-weight:500; color:#3a3a3c; transition:0.2s; cursor:pointer; text-decoration:none; }
    .nav-link:hover { color:#007AFF; }
    .glass-card { background:rgba(255,255,255,0.72); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.7); border-radius:16px; padding:1.5rem; }
    .form-input { width:100%; padding:14px 18px; border:1.5px solid rgba(60,60,67,0.08); border-radius:14px; font-size:1rem; background:rgba(255,255,255,0.8); }
    .form-input:focus { outline:none; border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.08); }
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; background:white; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.1); min-width:200px; padding:8px 0; border:1px solid rgba(0,0,0,0.04); z-index:100; }
    .dropdown-menu a { display:block; padding:10px 20px; color:#1c1c1e; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .dropdown-menu a:hover { background:#f0f0f5; }
    .dropdown-menu.show { display:block; }
    .profile-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#007AFF,#5856D6); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; }
    #toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 100%;
    }
    .toast {
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      font-size: 0.95rem;
      font-weight: 500;
      color: #1c1c1e;
      transform: translateX(calc(100% + 30px));
      animation: slideIn 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.success { border-left: 4px solid #34C759; }
    .toast.error { border-left: 4px solid #FF3B30; }
    .toast.warning { border-left: 4px solid #FF9500; }
    .toast i { font-size: 1.2rem; }
    .toast.success i { color: #34C759; }
    .toast.error i { color: #FF3B30; }
    .toast.warning i { color: #FF9500; }
    @keyframes slideIn { to { transform: translateX(0); } }
    .toast.hide { animation: slideOut 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes slideOut { to { transform: translateX(calc(100% + 30px)); opacity: 0; } }
    .badge-pending { background:#FF9500; color:white; padding:2px 10px; border-radius:60px; font-size:0.7rem; }
    .badge-processing { background:#007AFF; color:white; padding:2px 10px; border-radius:60px; font-size:0.7rem; }
    .badge-completed { background:#34C759; color:white; padding:2px 10px; border-radius:60px; font-size:0.7rem; }
  </style>
</head>
<body>

<!-- নেভবার (একই) -->
<nav class="fixed top-0 left-0 w-full glass z-50 h-16 md:h-20 flex items-center px-6 sm:px-8 lg:px-12">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <a href="index.html" class="text-xl md:text-2xl font-bold text-gray-900">
      SWD <span class="gradient-text">Store</span>
    </a>
    <div class="hidden md:flex items-center gap-6">
      <a href="index.html" class="nav-link text-sm">Home</a>
      <a href="get-new-website.html" class="nav-link text-sm">Store</a>
      <a href="fix-website.html" class="nav-link text-sm">Fix</a>
    </div>
    <div class="flex items-center gap-4">
      <a href="messages.html" class="text-gray-700 hover:text-blue-500 text-xl"><i class="fas fa-envelope"></i></a>
      <div id="auth-buttons" class="flex items-center gap-3">
        <a href="#" onclick="openAuthModal('signin')" class="nav-link text-sm">Sign In</a>
        <a href="#" onclick="openAuthModal('signup')" class="btn-primary text-sm py-2 px-5">Get Started</a>
      </div>
      <div id="profile-section" class="relative hidden">
        <div class="profile-avatar" id="profileAvatar">S</div>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="my-profile.html"><i class="fas fa-user mr-2"></i> My Profile</a>
          <a href="my-orders.html"><i class="fas fa-box mr-2"></i> My Orders</a>
          <a href="settings.html"><i class="fas fa-cog mr-2"></i> Settings</a>
          <a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- কন্টেন্ট -->
<section class="pt-28 pb-16 px-6 max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
  <div id="orderList" class="mt-6 space-y-4"></div>
</section>

<!-- টোস্ট -->
<div id="toast-container"></div>

<script type="module">
import { auth, db, collection, query, where, onSnapshot, signOut } from './firebase-config.js';

// ===== TOAST =====
window.showToast = (message, type = 'success') => {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
};

// ===== অর্ডার লোড =====
const orderList = document.getElementById('orderList');

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  const q = query(collection(db, 'orders'), where('userId', '==', user.uid));
  onSnapshot(q, (snapshot) => {
    if (snapshot.empty) {
      orderList.innerHTML = '<p class="text-gray-500">আপনার কোনো অর্ডার নেই।</p>';
      return;
    }
    let html = '';
    snapshot.forEach(doc => {
      const o = doc.data();
      const statusClass = o.status === 'pending' ? 'badge-pending' : o.status === 'processing' ? 'badge-processing' : 'badge-completed';
      html += `
        <div class="glass-card">
          <div class="flex flex-wrap justify-between items-start gap-2">
            <div>
              <p class="font-bold">Order #${doc.id.slice(0,8)}</p>
              <p class="text-sm">Total: $${o.total}</p>
              <p class="text-xs text-gray-500">Items: ${o.items ? o.items.length : 0}</p>
              ${o.transactionId ? `<p class="text-xs text-gray-500">Txn ID: ${o.transactionId}</p>` : ''}
            </div>
            <span class="${statusClass} px-2 py-1 rounded-full text-xs">${o.status}</span>
          </div>
        </div>
      `;
    });
    orderList.innerHTML = html;
  });
});

// ===== LOGOUT =====
window.handleLogout = async () => {
  await signOut(auth);
  window.location.href = 'index.html';
};
</script>
</body>
</html>
