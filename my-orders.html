<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-status {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .order-status.pending { background: #fef3c7; color: #d97706; }
    .order-status.processing { background: #dbeafe; color: #2563eb; }
    .order-status.completed { background: #d1fae5; color: #059669; }
    .order-status.cancelled { background: #fee2e2; color: #dc2626; }

    .order-card {
      transition: all 0.3s ease;
    }
    .order-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .detail-item:last-child { border-bottom: none; }

    .empty-state-icon {
      font-size: 4rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-4xl mx-auto">
        <!-- হেডার -->
        <div class="flex items-center gap-3 mb-2">
          <i class="fas fa-shopping-bag text-3xl text-blue-500"></i>
          <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
        </div>
        <p class="text-gray-500 mb-4">View all your orders and their status</p>

        <!-- ===== ফিল্টার ===== -->
        <div class="flex flex-wrap gap-3 items-center mb-6">
          <div class="relative flex-1 min-w-[200px]">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="searchOrders" placeholder="Search by order ID..." class="form-input pl-10" />
          </div>
          <select id="statusFilter" class="form-input max-w-xs">
            <option value="all">All Status</option>
            <option value="pending">🟡 Pending</option>
            <option value="processing">🔵 Processing</option>
            <option value="completed">🟢 Completed</option>
            <option value="cancelled">🔴 Cancelled</option>
          </select>
          <button onclick="resetFilters()" class="btn-outline text-sm py-2 px-4">
            <i class="fas fa-undo"></i> Reset
          </button>
          <button onclick="window.location.reload()" class="btn-outline text-sm py-2 px-4">
            <i class="fas fa-sync"></i> Refresh
          </button>
        </div>

        <!-- ===== অর্ডার লিস্ট ===== -->
        <div id="orderList" class="space-y-4">
          <div class="text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl"></i>
            <p class="mt-2">Loading orders...</p>
          </div>
        </div>

        <!-- ===== লোড মোর ===== -->
        <div id="loadMoreContainer" class="text-center mt-6 hidden">
          <button onclick="loadMoreOrders()" class="btn-outline">
            <i class="fas fa-chevron-down"></i> Load More
          </button>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- ===== অর্ডার ডিটেইল মডাল ===== -->
  <div id="orderDetailModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[300] hidden">
    <div class="bg-white rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold text-gray-900" id="detailOrderTitle">Order Details</h3>
        <button onclick="closeOrderDetail()" class="text-gray-400 hover:text-gray-600 text-xl">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div id="orderDetailContent">
        <!-- ডাইনামিক কন্টেন্ট -->
      </div>

      <div class="mt-6 flex flex-wrap gap-3">
        <button onclick="downloadInvoice()" class="btn-primary text-sm py-2 px-4">
          <i class="fas fa-file-pdf"></i> Download Invoice (TXT)
        </button>
        <button onclick="printOrder()" class="btn-outline text-sm py-2 px-4">
          <i class="fas fa-print"></i> Print
        </button>
        <button onclick="closeOrderDetail()" class="btn-outline text-sm py-2 px-4">
          <i class="fas fa-times"></i> Close
        </button>
      </div>
    </div>
  </div>

  <!-- ===== অথ মডাল ===== -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="form-input" />
        <div class="relative">
          <input type="password" id="authPassword" placeholder="Password" required class="form-input pr-10" />
          <button type="button" onclick="togglePasswordVisibility('authPassword')" class="absolute right-3 top-3 text-gray-400"><i class="fas fa-eye"></i></button>
        </div>
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <div class="mt-4 flex flex-col gap-2">
        <button onclick="window.socialLogin('google')" class="btn-outline w-full justify-center"><i class="fab fa-google"></i> Sign in with Google</button>
        <button onclick="window.socialLogin('github')" class="btn-outline w-full justify-center"><i class="fab fa-github"></i> Sign in with GitHub</button>
      </div>
      <p class="mt-2 text-sm text-center">
        <a href="#" onclick="window.showResetPasswordModal()" class="text-blue-600 hover:underline"><i class="fas fa-key"></i> Forgot Password?</a>
      </p>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    // ================================================================
    // ===== ইমপোর্ট =====
    // ================================================================
    import { 
  renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, 
  renderCartSidebar, setLoading, renderPaymentModal   // ← renderPaymentModal যোগ
} from './components.js';

  // ← এই লাইন যোগ করুন

    import { 
      auth, db, collection, doc, getDoc, setDoc, addDoc, onSnapshot, 
      query, where, serverTimestamp, signOut, onAuthStateChanged,
      signInWithEmailAndPassword, createUserWithEmailAndPassword, updateDoc,
      signInWithPopup, googleProvider, githubProvider, sendPasswordResetEmail
    } from './firebase-config.js';
    import { 
      renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, 
      renderCartSidebar, setLoading
    } from './components.js';

    // ================================================================
    // ===== রেন্ডার =====
    // ================================================================
    renderNavbar();
    renderPaymentModal(); 
    renderFooter();
    renderCartSidebar();
    updateCartBadge();

    // ================================================================
    // ===== টোস্ট =====
    // ================================================================
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ================================================================
    // ===== অথ মডাল =====
    // ================================================================
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    window.togglePasswordVisibility = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    window.socialLogin = async (provider) => {
      try {
        let result;
        if (provider === 'google') result = await signInWithPopup(auth, googleProvider);
        else if (provider === 'github') result = await signInWithPopup(auth, githubProvider);
        const user = result.user;
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, 'users', user.uid), {
            email: user.email,
            displayName: user.displayName || user.email.split('@')[0],
            role: 'user',
            createdAt: new Date().toISOString()
          });
        }
        showToast('✅ Signed in with ' + provider, 'success');
        closeAuthModal();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    window.showResetPasswordModal = () => {
      const email = prompt('Enter your email address to reset password:');
      if (!email) return;
      sendPasswordResetEmail(auth, email)
        .then(() => alert('✅ Password reset link sent to your email.'))
        .catch((error) => alert('⚠️ ' + error.message));
    };

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ Account created!', 'success');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ Logged out', 'success');
      window.location.href = 'index.html';
    };

    // ================================================================
    // ===== অর্ডার লজিক =====
    // ================================================================

    const orderList = document.getElementById('orderList');
    const searchInput = document.getElementById('searchOrders');
    const statusFilter = document.getElementById('statusFilter');
    const loadMoreContainer = document.getElementById('loadMoreContainer');

    let allOrders = [];
    let filteredOrders = [];
    let currentUser = null;
    let unsubOrders = null;

    // ===== রেন্ডার অর্ডার =====
    function renderOrders(orders) {
      if (!orders || orders.length === 0) {
        orderList.innerHTML = `
          <div class="text-center py-16">
            <i class="fas fa-inbox empty-state-icon text-gray-300"></i>
            <p class="text-gray-500 mt-4 text-lg">No orders found</p>
            <p class="text-gray-400 text-sm">Start shopping to see your orders here.</p>
            <a href="get-new-website.html" class="btn-primary mt-4 inline-block">
              <i class="fas fa-shopping-cart"></i> Browse Store
            </a>
          </div>
        `;
        return;
      }

      let html = '';
      orders.forEach(o => {
        const statusClass = o.status || 'pending';
        const date = o.createdAt?.toDate?.() || new Date(o.createdAt);
        const dateStr = date.toLocaleDateString('en-US', { 
          year: 'numeric', month: 'short', day: 'numeric' 
        });
        const timeStr = date.toLocaleTimeString('en-US', { 
          hour: '2-digit', minute: '2-digit' 
        });

        html += `
          <div class="glass-card order-card">
            <div class="flex flex-wrap justify-between items-start gap-3">
              <div class="flex-1 min-w-[150px]">
                <div class="flex items-center gap-3 flex-wrap">
                  <p class="font-bold text-gray-900 text-lg">
                    #${o.id?.slice(0, 8)?.toUpperCase() || 'N/A'}
                  </p>
                  <span class="order-status ${statusClass}">${statusClass}</span>
                </div>
                <p class="text-sm text-gray-500 mt-1">
                  <i class="far fa-calendar-alt mr-1"></i> ${dateStr} at ${timeStr}
                </p>
                <p class="text-sm text-gray-500">
                  <i class="fas fa-box mr-1"></i> ${o.items?.length || 0} items
                </p>
              </div>
              <div class="text-right">
                <p class="text-2xl font-bold text-blue-600">
                  $${o.total?.toFixed(2) || '0.00'}
                </p>
                ${o.transactionId ? `<p class="text-xs text-gray-400">Txn: ${o.transactionId}</p>` : ''}
                <button onclick="viewOrderDetail('${o.id}')" class="text-blue-600 text-sm mt-1 hover:underline">
                  <i class="fas fa-eye"></i> View Details
                </button>
              </div>
            </div>
          </div>
        `;
      });

      orderList.innerHTML = html;
    }

    // ===== ফিল্টার অ্যাপ্লাই =====
    function applyFilters() {
      const search = searchInput.value.toLowerCase().trim();
      const status = statusFilter.value;

      filteredOrders = allOrders.filter(o => {
        if (search) {
          const id = o.id?.toLowerCase() || '';
          const userEmail = o.userEmail?.toLowerCase() || '';
          if (!id.includes(search) && !userEmail.includes(search)) return false;
        }
        if (status !== 'all' && o.status !== status) return false;
        return true;
      });

      renderOrders(filteredOrders);
      loadMoreContainer.classList.add('hidden');
    }

    // ===== রিসেট ফিল্টার =====
    window.resetFilters = () => {
      searchInput.value = '';
      statusFilter.value = 'all';
      applyFilters();
    };

    // ===== অর্ডার লোড =====
    function loadOrders(userId) {
      if (unsubOrders) unsubOrders();

      const q = query(
        collection(db, 'orders'),
        where('userId', '==', userId),
        orderBy('createdAt', 'desc')
      );

      unsubOrders = onSnapshot(q, (snapshot) => {
        allOrders = [];
        snapshot.forEach(doc => {
          allOrders.push({ id: doc.id, ...doc.data() });
        });
        applyFilters();
      }, (error) => {
        console.error('Orders load error:', error);
        orderList.innerHTML = `
          <div class="text-center py-12 text-red-500">
            <i class="fas fa-exclamation-circle text-3xl"></i>
            <p class="mt-2">Error loading orders: ${error.message}</p>
            <button onclick="window.location.reload()" class="btn-primary mt-4 inline-block">
              <i class="fas fa-sync"></i> Retry
            </button>
          </div>
        `;
        showToast('⚠️ Error loading orders: ' + error.message, 'error');
      });
    }

    // ================================================================
    // ===== অর্ডার ডিটেইল =====
    // ================================================================

    let currentOrderId = null;
    let currentOrderData = null;

    window.viewOrderDetail = async (orderId) => {
      currentOrderId = orderId;
      
      try {
        const docSnap = await getDoc(doc(db, 'orders', orderId));
        if (!docSnap.exists()) {
          showToast('Order not found', 'error');
          return;
        }
        currentOrderData = { id: docSnap.id, ...docSnap.data() };
        renderOrderDetail(currentOrderData);
        document.getElementById('orderDetailModal').classList.remove('hidden');
      } catch (err) {
        showToast('⚠️ Error loading order: ' + err.message, 'error');
      }
    };

    function renderOrderDetail(o) {
      const content = document.getElementById('orderDetailContent');
      const date = o.createdAt?.toDate?.() || new Date(o.createdAt);
      const dateStr = date.toLocaleDateString('en-US', { 
        year: 'numeric', month: 'long', day: 'numeric' 
      });
      const timeStr = date.toLocaleTimeString('en-US', { 
        hour: '2-digit', minute: '2-digit' 
      });

      let itemsHtml = '';
      if (o.items && o.items.length > 0) {
        o.items.forEach(item => {
          const qty = item.quantity || 1;
          const price = item.price || 0;
          itemsHtml += `
            <div class="detail-item">
              <span class="text-gray-800">
                ${item.name} × ${qty}
              </span>
              <span class="font-medium text-gray-900">$${(price * qty).toFixed(2)}</span>
            </div>
          `;
        });
      } else {
        itemsHtml = '<p class="text-gray-400">No items found.</p>';
      }

      const statusClass = o.status || 'pending';
      const statusDisplay = statusClass.charAt(0).toUpperCase() + statusClass.slice(1);

      content.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <div>
            <p class="text-sm text-gray-500">Order ID</p>
            <p class="font-mono font-bold text-gray-900">#${o.id}</p>
          </div>
          <span class="order-status ${statusClass} text-sm px-4 py-1.5">${statusDisplay}</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <p class="text-sm text-gray-500">Date</p>
            <p class="text-gray-900">${dateStr}</p>
            <p class="text-sm text-gray-400">${timeStr}</p>
          </div>
          <div>
            <p class="text-sm text-gray-500">Total</p>
            <p class="text-2xl font-bold text-blue-600">$${o.total?.toFixed(2) || '0.00'}</p>
          </div>
        </div>

        <div class="mb-4">
          <p class="text-sm text-gray-500">Payment</p>
          <p class="text-gray-900">${o.paymentMethod || 'N/A'}</p>
          ${o.transactionId ? `<p class="text-sm text-gray-400">Transaction: ${o.transactionId}</p>` : '<p class="text-sm text-yellow-500">⚠️ Payment pending</p>'}
        </div>

        <div>
          <p class="text-sm text-gray-500 mb-2">Items (${o.items?.length || 0})</p>
          <div class="bg-gray-50 rounded-lg p-3">
            ${itemsHtml}
          </div>
        </div>

        ${o.status !== 'completed' ? `
          <div class="mt-4 p-3 bg-yellow-50 rounded-lg text-sm text-yellow-700">
            <i class="fas fa-clock"></i> 
            Your order is ${statusDisplay.toLowerCase()}. You'll be notified when it's completed.
          </div>
        ` : `
          <div class="mt-4 p-3 bg-green-50 rounded-lg text-sm text-green-700">
            <i class="fas fa-check-circle"></i> 
            Order completed! Thank you for shopping with us.
          </div>
        `}
      `;

      document.getElementById('detailOrderTitle').textContent = `Order #${o.id.slice(0, 8).toUpperCase()}`;
    }

    window.closeOrderDetail = () => {
      document.getElementById('orderDetailModal').classList.add('hidden');
      currentOrderId = null;
      currentOrderData = null;
    };

    // ===== মডালের বাইরে ক্লিক করলে বন্ধ =====
    document.getElementById('orderDetailModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeOrderDetail();
      }
    });

    // ================================================================
    // ===== ইনভয়েস ডাউনলোড =====
    // ================================================================

    window.downloadInvoice = () => {
      const o = currentOrderData;
      if (!o) {
        showToast('No order selected', 'error');
        return;
      }

      const date = o.createdAt?.toDate?.() || new Date(o.createdAt);
      const dateStr = date.toLocaleDateString('en-US', { 
        year: 'numeric', month: 'long', day: 'numeric' 
      });

      let itemsText = '';
      if (o.items && o.items.length > 0) {
        o.items.forEach(item => {
          const qty = item.quantity || 1;
          itemsText += `  ${item.name} × ${qty} = $${(item.price * qty).toFixed(2)}\n`;
        });
      }

      const invoiceContent = `
========================================
           SWD STORE - INVOICE
========================================

Order ID: #${o.id}
Date: ${dateStr}
Status: ${o.status?.toUpperCase() || 'PENDING'}

----------------------------------------
ITEMS:
${itemsText}
----------------------------------------

Total: $${o.total?.toFixed(2) || '0.00'}
Payment: ${o.paymentMethod || 'N/A'}
Transaction: ${o.transactionId || 'Not provided'}

----------------------------------------
Thank you for shopping with SWD Store!
Visit: https://your-store.com
========================================
      `;

      const blob = new Blob([invoiceContent.trim()], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `invoice-${o.id}-${dateStr.replace(/\s/g, '-')}.txt`;
      link.click();
      URL.revokeObjectURL(link.href);

      showToast('✅ Invoice downloaded!', 'success');
    };

    // ===== প্রিন্ট =====
    window.printOrder = () => {
      const content = document.getElementById('orderDetailContent');
      const title = document.getElementById('detailOrderTitle');
      
      const printWindow = window.open('', '_blank', 'width=800,height=600');
      printWindow.document.write(`
        <html>
          <head><title>Order Invoice</title></head>
          <body style="font-family: Arial, sans-serif; padding: 40px;">
            <h1 style="text-align:center;">SWD Store - Invoice</h1>
            <hr />
            <div>${title.textContent}</div>
            <div>${content.innerHTML}</div>
            <hr />
            <p style="text-align:center; color:#999;">Thank you for shopping with SWD Store!</p>
          </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.print();
    };

    // ================================================================
    // ===== অথ স্টেট =====
    // ================================================================

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      const displayName = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      updateNavbarAuth(user, displayName);

      loadOrders(user.uid);
    });

    // ===== সার্চ ইভেন্ট =====
    searchInput.addEventListener('input', applyFilters);
    statusFilter.addEventListener('change', applyFilters);

    // ===== কীবোর্ড শর্টকাট =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeOrderDetail();
      }
    });

    console.log('📦 My Orders page loaded successfully!');
  </script>
</body>
</html>
