<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fix Requests – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .request-status {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: capitalize;
      display: inline-block;
    }
    .request-status.pending { background: #fef3c7; color: #d97706; }
    .request-status.resolved { background: #d1fae5; color: #059669; }
    .request-status.closed { background: #e5e7eb; color: #6b7280; }

    .priority-badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .priority-badge.high { background: #fee2e2; color: #dc2626; }
    .priority-badge.medium { background: #fef3c7; color: #d97706; }
    .priority-badge.low { background: #d1fae5; color: #059669; }

    .ticket-code {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: rgba(0,0,0,0.04);
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .request-card {
      transition: all 0.3s ease;
    }
    .request-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .reply-box {
      background: #f0fdf4;
      border-left: 4px solid #22c55e;
      padding: 12px;
      border-radius: 8px;
    }
    .no-reply-box {
      background: #f9fafb;
      border-left: 4px solid #d1d5db;
      padding: 12px;
      border-radius: 8px;
    }

    .empty-state-icon {
      font-size: 4rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-4xl mx-auto">
        <!-- হেডার -->
        <div class="flex items-center gap-3 mb-2">
          <i class="fas fa-tools text-3xl text-blue-500"></i>
          <h1 class="text-3xl font-bold text-gray-900">My Fix Requests</h1>
        </div>
        <p class="text-gray-500 mb-4">Track all your website fix requests and replies from admin.</p>

        <!-- ===== ফিল্টার ===== -->
        <div class="flex flex-wrap gap-3 items-center mb-6">
          <div class="relative flex-1 min-w-[200px]">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="searchRequests" placeholder="Search by ticket number..." class="form-input pl-10" />
          </div>
          <select id="statusFilter" class="form-input max-w-xs">
            <option value="all">All Status</option>
            <option value="pending">🟡 Pending</option>
            <option value="resolved">🟢 Resolved</option>
            <option value="closed">⚪ Closed</option>
          </select>
          <select id="priorityFilter" class="form-input max-w-xs">
            <option value="all">All Priority</option>
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
          <button onclick="resetFilters()" class="btn-outline text-sm py-2 px-4">
            <i class="fas fa-undo"></i> Reset
          </button>
          <a href="fix-website.html" class="btn-primary text-sm py-2 px-4">
            <i class="fas fa-plus"></i> New Request
          </a>
        </div>

        <!-- ===== রিকোয়েস্ট লিস্ট ===== -->
        <div id="requestList" class="space-y-4">
          <div class="text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl"></i>
            <p class="mt-2">Loading your requests...</p>
          </div>
        </div>

        <!-- ===== স্ট্যাটিস্টিক্স ===== -->
        <div id="statsContainer" class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-3 hidden">
          <div class="glass-card text-center">
            <p class="text-2xl font-bold text-gray-900" id="totalCount">0</p>
            <p class="text-xs text-gray-500">Total</p>
          </div>
          <div class="glass-card text-center">
            <p class="text-2xl font-bold text-yellow-600" id="pendingCount">0</p>
            <p class="text-xs text-gray-500">Pending</p>
          </div>
          <div class="glass-card text-center">
            <p class="text-2xl font-bold text-green-600" id="resolvedCount">0</p>
            <p class="text-xs text-gray-500">Resolved</p>
          </div>
          <div class="glass-card text-center">
            <p class="text-2xl font-bold text-gray-500" id="closedCount">0</p>
            <p class="text-xs text-gray-500">Closed</p>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- ===== অথ মডাল ===== -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="form-input" />
        <div class="relative">
          <input type="password" id="authPassword" placeholder="Password" required class="form-input pr-10" />
          <button type="button" onclick="togglePasswordVisibility('authPassword')" class="absolute right-3 top-3 text-gray-400"><i class="fas fa-eye"></i></button>
        </div>
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <div class="mt-4 flex flex-col gap-2">
        <button onclick="window.socialLogin('google')" class="btn-outline w-full justify-center"><i class="fab fa-google"></i> Sign in with Google</button>
        <button onclick="window.socialLogin('github')" class="btn-outline w-full justify-center"><i class="fab fa-github"></i> Sign in with GitHub</button>
      </div>
      <p class="mt-2 text-sm text-center">
        <a href="#" onclick="window.showResetPasswordModal()" class="text-blue-600 hover:underline"><i class="fas fa-key"></i> Forgot Password?</a>
      </p>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    // ================================================================
    // ===== ইমপোর্ট =====
    // ================================================================
    import { 
      auth, db, collection, query, where, onSnapshot, signOut, 
      onAuthStateChanged, doc, getDoc, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc,
      signInWithPopup, googleProvider, githubProvider, sendPasswordResetEmail,
      orderBy
    } from './firebase-config.js';
    import { 
      renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, 
      renderCartSidebar, setLoading
    } from './components.js';

    // ================================================================
    // ===== রেন্ডার =====
    // ================================================================
    renderNavbar();
    renderFooter();
    renderCartSidebar();
    updateCartBadge();

    // ================================================================
    // ===== টোস্ট =====
    // ================================================================
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ================================================================
    // ===== অথ মডাল =====
    // ================================================================
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    window.togglePasswordVisibility = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    window.socialLogin = async (provider) => {
      try {
        let result;
        if (provider === 'google') result = await signInWithPopup(auth, googleProvider);
        else if (provider === 'github') result = await signInWithPopup(auth, githubProvider);
        const user = result.user;
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, 'users', user.uid), {
            email: user.email,
            displayName: user.displayName || user.email.split('@')[0],
            role: 'user',
            createdAt: new Date().toISOString()
          });
        }
        showToast('✅ Signed in with ' + provider, 'success');
        closeAuthModal();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    window.showResetPasswordModal = () => {
      const email = prompt('Enter your email address to reset password:');
      if (!email) return;
      sendPasswordResetEmail(auth, email)
        .then(() => alert('✅ Password reset link sent to your email.'))
        .catch((error) => alert('⚠️ ' + error.message));
    };

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ Account created!', 'success');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ Logged out', 'success');
      window.location.href = 'index.html';
    };

    // ================================================================
    // ===== রিকোয়েস্ট লজিক =====
    // ================================================================

    const requestList = document.getElementById('requestList');
    const searchInput = document.getElementById('searchRequests');
    const statusFilter = document.getElementById('statusFilter');
    const priorityFilter = document.getElementById('priorityFilter');
    const statsContainer = document.getElementById('statsContainer');

    let allRequests = [];
    let filteredRequests = [];
    let currentUser = null;
    let unsubRequests = null;

    // ===== স্ট্যাট আপডেট =====
    function updateStats(requests) {
      const total = requests.length;
      const pending = requests.filter(r => r.status === 'pending').length;
      const resolved = requests.filter(r => r.status === 'resolved').length;
      const closed = requests.filter(r => r.status === 'closed').length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('resolvedCount').textContent = resolved;
      document.getElementById('closedCount').textContent = closed;

      statsContainer.classList.remove('hidden');
    }

    // ===== রেন্ডার রিকোয়েস্ট =====
    function renderRequests(requests) {
      if (!requests || requests.length === 0) {
        requestList.innerHTML = `
          <div class="text-center py-16">
            <i class="fas fa-inbox empty-state-icon text-gray-300"></i>
            <p class="text-gray-500 mt-4 text-lg">No fix requests found</p>
            <p class="text-gray-400 text-sm">Submit a fix request to get help from our team.</p>
            <a href="fix-website.html" class="btn-primary mt-4 inline-block">
              <i class="fas fa-plus"></i> Submit Request
            </a>
          </div>
        `;
        updateStats([]);
        return;
      }

      let html = '';
      requests.forEach(r => {
        const status = r.status || 'pending';
        const priority = r.priority || 'medium';
        const date = r.timestamp?.toDate?.() || new Date(r.timestamp);
        const dateStr = date.toLocaleDateString('en-US', { 
          year: 'numeric', month: 'short', day: 'numeric' 
        });
        const timeStr = date.toLocaleTimeString('en-US', { 
          hour: '2-digit', minute: '2-digit' 
        });

        // রিপ্লাই ডিসপ্লে
        let replyHtml = '';
        if (r.reply) {
          const replyDate = r.replyTimestamp?.toDate?.() || new Date(r.replyTimestamp);
          const replyDateStr = replyDate.toLocaleDateString('en-US', { 
            year: 'numeric', month: 'short', day: 'numeric' 
          });
          const replyTimeStr = replyDate.toLocaleTimeString('en-US', { 
            hour: '2-digit', minute: '2-digit' 
          });
          replyHtml = `
            <div class="reply-box mt-3">
              <p class="text-sm font-medium text-green-700">
                <i class="fas fa-reply"></i> Admin Reply
              </p>
              <p class="text-sm text-gray-800 mt-1">${r.reply}</p>
              <p class="text-xs text-gray-400 mt-1">${replyDateStr} at ${replyTimeStr}</p>
            </div>
          `;
        } else if (status === 'pending') {
          replyHtml = `
            <div class="no-reply-box mt-3">
              <p class="text-sm text-gray-500">
                <i class="fas fa-clock"></i> No reply yet. Our team is reviewing your request.
              </p>
            </div>
          `;
        }

        // ক্যাটাগরি আইকন
        const categoryIcons = {
          speed: '🚀',
          error: '🐛',
          design: '🎨',
          hacking: '🔒',
          hosting: '☁️',
          other: '📌'
        };
        const categoryIcon = categoryIcons[r.category] || '📌';

        html += `
          <div class="glass-card request-card">
            <div class="flex flex-wrap justify-between items-start gap-3">
              <div class="flex-1 min-w-[150px]">
                <div class="flex items-center gap-3 flex-wrap">
                  <span class="ticket-code text-sm">${r.ticketNumber || 'N/A'}</span>
                  <span class="request-status ${status}">${status}</span>
                  <span class="priority-badge ${priority}">${priority}</span>
                </div>
                <p class="text-sm font-medium text-gray-900 mt-2">
                  <span class="text-gray-500">${categoryIcon}</span>
                  ${r.problem?.substring(0, 80) || 'No description'}${r.problem?.length > 80 ? '...' : ''}
                </p>
                <p class="text-xs text-gray-400 mt-1">
                  <i class="far fa-calendar-alt mr-1"></i> ${dateStr} at ${timeStr}
                </p>
                ${r.category ? `<p class="text-xs text-gray-400">Category: ${r.category}</p>` : ''}
              </div>
              <div class="text-right flex flex-col items-end gap-1">
                <span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full">
                  ${r.imageLink ? `<a href="${r.imageLink}" target="_blank" class="text-blue-500 hover:underline"><i class="fas fa-image"></i> Image</a>` : 'No image'}
                </span>
              </div>
            </div>

            <!-- রিপ্লাই -->
            ${replyHtml}

            <!-- রিকোয়েস্ট আইডি -->
            <div class="text-xs text-gray-400 mt-2">
              ID: ${r.id?.slice(0, 12) || 'N/A'}
            </div>
          </div>
        `;
      });

      requestList.innerHTML = html;
      updateStats(requests);
    }

    // ===== ফিল্টার অ্যাপ্লাই =====
    function applyFilters() {
      const search = searchInput.value.toLowerCase().trim();
      const status = statusFilter.value;
      const priority = priorityFilter.value;

      filteredRequests = allRequests.filter(r => {
        if (search) {
          const ticket = r.ticketNumber?.toLowerCase() || '';
          const problem = r.problem?.toLowerCase() || '';
          if (!ticket.includes(search) && !problem.includes(search)) return false;
        }
        if (status !== 'all' && r.status !== status) return false;
        if (priority !== 'all' && r.priority !== priority) return false;
        return true;
      });

      renderRequests(filteredRequests);
    }

    // ===== রিসেট ফিল্টার =====
    window.resetFilters = () => {
      searchInput.value = '';
      statusFilter.value = 'all';
      priorityFilter.value = 'all';
      applyFilters();
    };

    // ===== রিকোয়েস্ট লোড =====
    function loadRequests(userId) {
      if (unsubRequests) unsubRequests();

      const q = query(
        collection(db, 'fixRequests'),
        where('userId', '==', userId),
        orderBy('timestamp', 'desc')
      );

      unsubRequests = onSnapshot(q, (snapshot) => {
        allRequests = [];
        snapshot.forEach(doc => {
          allRequests.push({ id: doc.id, ...doc.data() });
        });
        applyFilters();
      }, (error) => {
        console.error('Requests load error:', error);
        requestList.innerHTML = `
          <div class="text-center py-12 text-red-500">
            <i class="fas fa-exclamation-circle text-3xl"></i>
            <p class="mt-2">Error loading requests: ${error.message}</p>
            <button onclick="window.location.reload()" class="btn-primary mt-4 inline-block">
              <i class="fas fa-sync"></i> Retry
            </button>
          </div>
        `;
        showToast('⚠️ Error loading requests: ' + error.message, 'error');
      });
    }

    // ================================================================
    // ===== অথ স্টেট =====
    // ================================================================

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      const displayName = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      updateNavbarAuth(user, displayName);

      loadRequests(user.uid);
    });

    // ===== ফিল্টার ইভেন্ট =====
    searchInput.addEventListener('input', applyFilters);
    statusFilter.addEventListener('change', applyFilters);
    priorityFilter.addEventListener('change', applyFilters);

    console.log('🔧 My Fix Requests page loaded successfully!');
  </script>
</body>
</html>
