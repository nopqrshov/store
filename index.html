<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWD Store – Landing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== Scroll Animation ===== */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Back to Top Button ===== */
    .scroll-top-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      color: #fff;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,122,255,0.35);
      z-index: 999;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .scroll-top-btn.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .scroll-top-btn:hover {
      transform: scale(1.05);
    }

    /* ===== Hero Gradient ===== */
    .hero-gradient {
      background: radial-gradient(ellipse at top, rgba(0,122,255,0.06), transparent 70%);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <!-- ===== হিরো ===== -->
      <section class="hero-gradient pt-32 pb-16 px-6 min-h-screen flex items-center">
        <div class="max-w-7xl mx-auto text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-gray-900 leading-tight fade-up">
            Build Your <span class="gradient-text">Dream Website</span> Today
          </h1>
          <p class="text-xl text-gray-500 mt-4 max-w-2xl mx-auto fade-up" style="transition-delay:0.1s;">
            Choose from ready-made packages or get a fully custom solution. Fast, reliable, and modern.
          </p>
          <div class="mt-10 flex flex-wrap justify-center gap-4 fade-up" style="transition-delay:0.2s;">
            <a href="get-new-website.html" class="btn-primary"><i class="fas fa-shopping-cart"></i> Explore Store</a>
            <a href="fix-website.html" class="btn-outline"><i class="fas fa-wrench"></i> Fix My Site</a>
          </div>

          <!-- ===== ডাইনামিক প্যাকেজ ===== -->
          <div id="featuredPackages" class="mt-16 grid md:grid-cols-3 gap-6 text-left">
            <!-- Skeleton Loading -->
            <div class="glass-card fade-up"><div class="h-8 w-20 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-3/4 bg-gray-200 rounded mt-3 animate-pulse"></div><div class="h-4 w-1/2 bg-gray-200 rounded mt-2 animate-pulse"></div><div class="h-8 w-16 bg-gray-200 rounded mt-3 animate-pulse"></div></div>
            <div class="glass-card fade-up"><div class="h-8 w-20 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-3/4 bg-gray-200 rounded mt-3 animate-pulse"></div><div class="h-4 w-1/2 bg-gray-200 rounded mt-2 animate-pulse"></div><div class="h-8 w-16 bg-gray-200 rounded mt-3 animate-pulse"></div></div>
            <div class="glass-card fade-up"><div class="h-8 w-20 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-3/4 bg-gray-200 rounded mt-3 animate-pulse"></div><div class="h-4 w-1/2 bg-gray-200 rounded mt-2 animate-pulse"></div><div class="h-8 w-16 bg-gray-200 rounded mt-3 animate-pulse"></div></div>
          </div>
        </div>
      </section>

      <!-- ===== টেস্টিমোনিয়াল ===== -->
      <section id="testimonials" class="py-16 px-6 bg-gray-50">
        <div class="max-w-6xl mx-auto">
          <h2 class="text-3xl font-bold text-center fade-up">What Our Clients Say</h2>
          <div id="testimonialList" class="mt-8 grid md:grid-cols-3 gap-6">
            <div class="glass-card text-center fade-up"><div class="h-16 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-1/2 bg-gray-200 rounded mx-auto mt-3 animate-pulse"></div></div>
            <div class="glass-card text-center fade-up"><div class="h-16 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-1/2 bg-gray-200 rounded mx-auto mt-3 animate-pulse"></div></div>
            <div class="glass-card text-center fade-up"><div class="h-16 bg-gray-200 rounded animate-pulse"></div><div class="h-6 w-1/2 bg-gray-200 rounded mx-auto mt-3 animate-pulse"></div></div>
          </div>
        </div>
      </section>

      <!-- ===== FAQ ===== -->
      <section id="faq" class="py-16 px-6">
        <div class="max-w-3xl mx-auto">
          <h2 class="text-3xl font-bold text-center fade-up">Frequently Asked Questions</h2>
          <div id="faqList" class="mt-8 space-y-4">
            <div class="glass-card fade-up"><div class="h-6 bg-gray-200 rounded animate-pulse"></div></div>
            <div class="glass-card fade-up"><div class="h-6 bg-gray-200 rounded animate-pulse"></div></div>
            <div class="glass-card fade-up"><div class="h-6 bg-gray-200 rounded animate-pulse"></div></div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- ===== Back to Top Button ===== -->
  <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- ===== অথ মডাল (Forgot Password লিংক সরানো হয়েছে) ===== -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="form-input" />
        <div class="relative">
          <input type="password" id="authPassword" placeholder="Password" required class="form-input pr-10" />
          <button type="button" onclick="togglePasswordVisibility('authPassword')" class="absolute right-3 top-3 text-gray-400"><i class="fas fa-eye"></i></button>
        </div>
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <div class="mt-4 flex flex-col gap-2">
        <button onclick="window.socialLogin('google')" class="btn-outline w-full justify-center"><i class="fab fa-google"></i> Sign in with Google</button>
        <button onclick="window.socialLogin('github')" class="btn-outline w-full justify-center"><i class="fab fa-github"></i> Sign in with GitHub</button>
      </div>
      <!-- Forgot Password লিংক সম্পূর্ণ সরানো হয়েছে -->
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    // ===== ইমপোর্ট =====
    import { 
      auth, db, collection, doc, getDoc, getDocs, onSnapshot, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      onAuthStateChanged, signOut, setDoc, 
      signInWithPopup, googleProvider, githubProvider 
    } from './firebase-config.js';
    import { 
      renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, 
      renderCartSidebar, setLoading, renderPaymentModal
    } from './components.js';

    // ===== রেন্ডার =====
    renderNavbar();
    renderFooter();
    renderCartSidebar();
    renderPaymentModal();
    updateCartBadge();

    // ===== টোস্ট =====
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ===== Scroll Animation (Intersection Observer) =====
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    });

    // ===== Back to Top Button =====
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        scrollBtn.classList.add('show');
      } else {
        scrollBtn.classList.remove('show');
      }
    });
    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ===== অথ মডাল =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    window.togglePasswordVisibility = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ Account created!', 'success');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    window.socialLogin = async (provider) => {
      try {
        let result;
        if (provider === 'google') result = await signInWithPopup(auth, googleProvider);
        else if (provider === 'github') result = await signInWithPopup(auth, githubProvider);
        const user = result.user;
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, 'users', user.uid), {
            email: user.email,
            displayName: user.displayName || user.email.split('@')[0],
            role: 'user',
            createdAt: new Date().toISOString()
          });
        }
        showToast('✅ Signed in with ' + provider, 'success');
        closeAuthModal();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    // showResetPasswordModal সম্পূর্ণ সরানো হয়েছে

    onAuthStateChanged(auth, async (user) => {
      let name = null;
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      }
      updateNavbarAuth(user, name);
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ Logged out', 'success');
    };

    // ===== ডাইনামিক প্যাকেজ =====
    const packagesContainer = document.getElementById('featuredPackages');
    onSnapshot(collection(db, 'products'), (snapshot) => {
      if (snapshot.empty) {
        packagesContainer.innerHTML = `<p class="text-gray-500 col-span-3 text-center">No packages available.</p>`;
        return;
      }
      let html = '';
      snapshot.forEach(doc => {
        const p = doc.data();
        html += `
          <div class="glass-card fade-up">
            <i class="fas fa-file-code text-3xl text-blue-500"></i>
            <h3 class="font-bold mt-2">${p.name}</h3>
            <p class="text-sm text-gray-500">${p.desc || p.description || ''}</p>
            <span class="block mt-2 font-bold text-gray-800">$${p.price}</span>
            <a href="get-new-website.html" class="btn-primary text-sm py-2 px-4 mt-3 inline-block">View</a>
          </div>
        `;
      });
      packagesContainer.innerHTML = html;
      // নতুন এলিমেন্টগুলোর জন্য Observer পুনরায় চালু
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    });

    // ===== টেস্টিমোনিয়াল =====
    const testimonialContainer = document.getElementById('testimonialList');
    onSnapshot(collection(db, 'testimonials'), (snapshot) => {
      if (snapshot.empty) {
        testimonialContainer.innerHTML = `<p class="text-gray-500 col-span-3 text-center">No testimonials yet.</p>`;
        return;
      }
      let html = '';
      snapshot.forEach(doc => {
        const t = doc.data();
        html += `
          <div class="glass-card text-center fade-up">
            <p class="text-gray-600 italic">“${t.text}”</p>
            <p class="font-bold mt-2">- ${t.name}</p>
            <p class="text-sm text-gray-400">${t.role || ''}</p>
          </div>
        `;
      });
      testimonialContainer.innerHTML = html;
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    });

    // ===== FAQ =====
    const faqContainer = document.getElementById('faqList');
    onSnapshot(collection(db, 'faqs'), (snapshot) => {
      if (snapshot.empty) {
        faqContainer.innerHTML = `<p class="text-gray-500 text-center">No FAQs yet.</p>`;
        return;
      }
      let html = '';
      let index = 0;
      snapshot.forEach(doc => {
        const f = doc.data();
        const idx = index++;
        html += `
          <div class="glass-card cursor-pointer fade-up" onclick="toggleFaq(${idx})">
            <div class="flex justify-between items-center">
              <h3 class="font-semibold">${f.question}</h3>
              <i class="fas fa-chevron-down text-gray-400 transition-transform" id="faqIcon${idx}"></i>
            </div>
            <div id="faqAnswer${idx}" class="mt-2 text-gray-600 hidden">${f.answer}</div>
          </div>
        `;
      });
      faqContainer.innerHTML = html;
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    });

    window.toggleFaq = (index) => {
      const ans = document.getElementById(`faqAnswer${index}`);
      const icon = document.getElementById(`faqIcon${index}`);
      if (ans) {
        ans.classList.toggle('hidden');
        if (icon) icon.classList.toggle('rotate-180');
      }
    };
  </script>
</body>
</html>
