<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .sidebar { width:260px; height:100vh; position:fixed; top:0; left:0; background:white; border-right:1px solid rgba(0,0,0,0.04); padding:1.5rem; overflow-y:auto; }
    .main { margin-left:260px; padding:2rem; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px; cursor:pointer; transition:0.2s; color:#3a3a3c; }
    .nav-item:hover, .nav-item.active { background:#f0f0f5; color:#007AFF; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .chart-container { height: 280px; position: relative; }
    .dashboard-card { transition: all 0.3s ease; }
    .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 class="text-xl font-bold text-gray-900 mb-6">SWD Admin</h2>
  <div class="space-y-1">
    <div class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
    <div class="nav-item" data-tab="products"><i class="fas fa-box"></i> Products</div>
    <div class="nav-item" data-tab="orders"><i class="fas fa-shopping-cart"></i> Orders</div>
    <div class="nav-item" data-tab="users"><i class="fas fa-users"></i> Users</div>
    <div class="nav-item" data-tab="messages"><i class="fas fa-envelope"></i> Messages</div>
    <div class="nav-item" data-tab="fixrequests"><i class="fas fa-wrench"></i> Fix Requests</div>
    <div class="nav-item" data-tab="settings"><i class="fas fa-cog"></i> Settings</div>
    <div class="nav-item" data-tab="supportchat"><i class="fas fa-comments"></i> Support Chat</div>
  </div>
  <div class="absolute bottom-6 left-6">
    <button onclick="logoutAdmin()" class="text-red-500 hover:text-red-700"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="main">
  <!-- ===== ড্যাশবোর্ড ===== -->
  <div id="tab-dashboard" class="tab-content active">
    <h2 class="text-2xl font-bold">Dashboard</h2>
    <div class="grid grid-cols-5 gap-4 mt-6">
      <div class="glass-card dashboard-card"><span class="text-gray-500">Total Orders</span><div id="totalOrders" class="text-2xl font-bold">0</div></div>
      <div class="glass-card dashboard-card"><span class="text-gray-500">Revenue</span><div id="totalRevenue" class="text-2xl font-bold text-green-600">$0</div></div>
      <div class="glass-card dashboard-card"><span class="text-gray-500">Products</span><div id="totalProducts" class="text-2xl font-bold">0</div></div>
      <div class="glass-card dashboard-card"><span class="text-gray-500">Messages</span><div id="totalMessages" class="text-2xl font-bold">0</div></div>
      <div class="glass-card dashboard-card"><span class="text-gray-500">Fix Requests</span><div id="totalFixRequests" class="text-2xl font-bold">0</div></div>
    </div>
    <div class="grid grid-cols-2 gap-6 mt-6">
      <div class="glass-card">
        <h3 class="font-semibold text-gray-700 mb-2">📊 Monthly Orders</h3>
        <div class="chart-container"><canvas id="monthlyOrdersChart"></canvas></div>
      </div>
      <div class="glass-card">
        <h3 class="font-semibold text-gray-700 mb-2">🧩 Order Status</h3>
        <div class="chart-container"><canvas id="statusChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ===== পণ্য ===== -->
  <div id="tab-products" class="tab-content">
    <div class="flex justify-between items-center">
      <h2 class="text-2xl font-bold">Products</h2>
      <button onclick="openProductModal()" class="btn-primary"><i class="fas fa-plus"></i> Add Product</button>
    </div>
    <div id="productList" class="grid grid-cols-3 gap-4 mt-4"></div>
    <div id="productModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-2xl p-8 max-w-md w-full">
        <h3 id="productModalTitle" class="text-xl font-bold">Add Product</h3>
        <form id="productForm" class="mt-4 space-y-3">
          <input type="text" id="prodName" placeholder="Product Name" required class="form-input" />
          <input type="text" id="prodDesc" placeholder="Description" class="form-input" />
          <input type="number" id="prodPrice" placeholder="Price" required class="form-input" />
          <input type="text" id="prodCategory" placeholder="Category (static/spa/dynamic)" class="form-input" />
          <input type="text" id="prodImage" placeholder="Image URL (Google Drive link)" class="form-input" />
          <input type="hidden" id="prodId" />
          <button type="submit" class="btn-primary w-full">Save</button>
        </form>
        <button onclick="closeProductModal()" class="mt-2 text-gray-500">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== অর্ডার ===== -->
  <div id="tab-orders" class="tab-content">
    <h2 class="text-2xl font-bold">Orders</h2>
    <div id="orderList" class="space-y-4 mt-4"></div>
  </div>

  <!-- ===== ইউজার ===== -->
  <div id="tab-users" class="tab-content">
    <h2 class="text-2xl font-bold">Users</h2>
    <div id="userList" class="grid grid-cols-3 gap-4 mt-4"></div>
  </div>

  <!-- ===== কন্টাক্ট মেসেজ ===== -->
  <div id="tab-messages" class="tab-content">
    <h2 class="text-2xl font-bold">Contact Messages</h2>
    <div id="messageList" class="space-y-3 mt-4"></div>
  </div>

  <!-- ===== ফিক্স রিকোয়েস্ট (রিপ্লাই সহ) ===== -->
  <div id="tab-fixrequests" class="tab-content">
    <h2 class="text-2xl font-bold">Fix Requests</h2>
    <div id="fixRequestList" class="space-y-3 mt-4"></div>
  </div>

  <!-- ===== সেটিংস ===== -->
  <div id="tab-settings" class="tab-content">
    <h2 class="text-2xl font-bold">Settings</h2>
    <form id="settingsForm" class="mt-4 space-y-3 max-w-md">
      <label class="block">BKASH Number</label>
      <input type="text" id="bkashNumber" class="form-input" />
      <label class="block">NAGAD Number</label>
      <input type="text" id="nagadNumber" class="form-input" />
      <label class="block">USDT Address</label>
      <input type="text" id="usdtAddress" class="form-input" />
      <button type="submit" class="btn-primary">Save Settings</button>
    </form>
  </div>

  <!-- ===== সাপোর্ট চ্যাট ===== -->
  <div id="tab-supportchat" class="tab-content">
    <h2 class="text-2xl font-bold">Support Chat</h2>
    <div class="glass-card mt-4">
      <div id="adminChatContainer" class="chat-container"></div>
      <form id="adminChatForm" class="mt-4 flex gap-2">
        <input type="text" id="adminChatInput" placeholder="Type your reply..." class="form-input flex-1" required />
        <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i></button>
      </form>
    </div>
  </div>
</div>

<script type="module">
import { 
  auth, db, collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, addDoc, 
  onSnapshot, query, where, orderBy, serverTimestamp, signOut, onAuthStateChanged 
} from './firebase-config.js';
import { setLoading } from './components.js';

// ===== অথ চেক =====
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'admin-login.html'; return; }
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  if (!userDoc.exists() || userDoc.data().role !== 'admin') {
    alert('Unauthorized'); signOut(auth); window.location.href = 'admin-login.html';
  }
});

// ===== চার্ট ভেরিয়েবল =====
let monthlyChart = null;
let statusChart = null;

// ===== ড্যাশবোর্ড ডেটা & চার্ট আপডেট =====
function updateCharts(ordersData) {
  const monthMap = {};
  let totalRevenue = 0;
  const statusCount = { pending: 0, processing: 0, completed: 0 };

  ordersData.forEach(o => {
    const date = o.createdAt?.toDate?.() || new Date();
    const monthKey = date.toLocaleString('default', { month: 'short', year: 'numeric' });
    monthMap[monthKey] = (monthMap[monthKey] || 0) + 1;
    totalRevenue += o.total || 0;
    if (o.status) statusCount[o.status] = (statusCount[o.status] || 0) + 1;
  });

  document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;

  const months = Object.keys(monthMap).sort((a, b) => new Date(a) - new Date(b));
  const counts = months.map(m => monthMap[m]);

  const ctx1 = document.getElementById('monthlyOrdersChart').getContext('2d');
  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: months.length ? months : ['No Data'],
      datasets: [{
        label: 'Orders',
        data: months.length ? counts : [0],
        backgroundColor: 'rgba(0, 122, 255, 0.6)',
        borderColor: '#007AFF',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });

  const ctx2 = document.getElementById('statusChart').getContext('2d');
  if (statusChart) statusChart.destroy();
  const hasData = statusCount.pending + statusCount.processing + statusCount.completed > 0;
  statusChart = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: hasData ? ['Pending', 'Processing', 'Completed'] : ['No Orders'],
      datasets: [{
        data: hasData ? [statusCount.pending, statusCount.processing, statusCount.completed] : [1],
        backgroundColor: ['#FF9500', '#007AFF', '#34C759'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      cutout: '70%'
    }
  });
}

// ===== অর্ডার স্ন্যাপশট =====
let allOrders = [];
onSnapshot(collection(db, 'orders'), (snapshot) => {
  document.getElementById('totalOrders').innerText = snapshot.size;
  allOrders = [];
  let html = '';
  snapshot.forEach(doc => {
    const o = doc.data();
    allOrders.push({ id: doc.id, ...o });
    const statusClass = o.status === 'pending' ? 'badge-pending' : o.status === 'processing' ? 'badge-processing' : 'badge-completed';
    html += `<div class="glass-card">
      <div class="flex flex-wrap justify-between items-start gap-2">
        <div>
          <p class="font-bold">User: ${o.userId}</p>
          <p class="text-sm">Total: $${o.total}</p>
          ${o.transactionId ? `<p class="text-xs text-gray-500">Txn ID: ${o.transactionId}</p>` : '<p class="text-xs text-red-400">Payment pending</p>'}
          ${o.paymentMethod ? `<p class="text-xs text-gray-400">Method: ${o.paymentMethod}</p>` : ''}
        </div>
        <div class="flex items-center gap-2">
          <span class="${statusClass} px-2 py-1 rounded-full text-xs">${o.status}</span>
          <select onchange="updateOrderStatus('${doc.id}', this.value)" class="border rounded p-1 text-sm">
            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
            <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
          </select>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('orderList').innerHTML = html || '<p class="text-gray-500">No orders.</p>';
  updateCharts(allOrders);
});

// ===== প্রোডাক্ট =====
const productList = document.getElementById('productList');
onSnapshot(collection(db, 'products'), (snapshot) => {
  document.getElementById('totalProducts').innerText = snapshot.size;
  let html = '';
  snapshot.forEach(doc => {
    const p = doc.data();
    html += `<div class="glass-card">
      <img src="${p.imageUrl || 'https://via.placeholder.com/300x150?text=No+Image'}" alt="${p.name}" class="w-full h-32 object-cover rounded-t-lg mb-2" />
      <h3 class="font-bold">${p.name}</h3>
      <p class="text-sm text-gray-500">$${p.price}</p>
      <button onclick="editProduct('${doc.id}')" class="text-blue-600 text-sm"><i class="fas fa-edit"></i></button>
      <button onclick="deleteProduct('${doc.id}')" class="text-red-500 text-sm ml-2"><i class="fas fa-trash"></i></button>
    </div>`;
  });
  productList.innerHTML = html || '<p class="text-gray-500">No products yet.</p>';
});

window.editProduct = async (id) => {
  const docSnap = await getDoc(doc(db, 'products', id));
  if (docSnap.exists()) {
    const data = docSnap.data();
    document.getElementById('prodId').value = id;
    document.getElementById('prodName').value = data.name;
    document.getElementById('prodDesc').value = data.desc || '';
    document.getElementById('prodPrice').value = data.price;
    document.getElementById('prodCategory').value = data.category || '';
    document.getElementById('prodImage').value = data.imageUrl || '';
    document.getElementById('productModalTitle').innerText = 'Edit Product';
    document.getElementById('productModal').classList.remove('hidden');
  }
};
window.openProductModal = (id) => {
  document.getElementById('productModal').classList.remove('hidden');
  if (id) editProduct(id);
  else { document.getElementById('productModalTitle').innerText = 'Add Product'; document.getElementById('prodId').value = ''; }
};
window.closeProductModal = () => {
  document.getElementById('productModal').classList.add('hidden');
  document.getElementById('productForm').reset();
};

const productForm = document.getElementById('productForm');
const productSubmitBtn = productForm.querySelector('button[type="submit"]');
productForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('prodName').value.trim();
  const desc = document.getElementById('prodDesc').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value);
  const category = document.getElementById('prodCategory').value.trim();
  const imageUrl = document.getElementById('prodImage').value.trim();
  const id = document.getElementById('prodId').value;
  if (!name || !price) return alert('Name and price required.');
  setLoading(productSubmitBtn, true, 'Save');
  try {
    const productData = { name, desc, price, category, imageUrl };
    if (id) await updateDoc(doc(db, 'products', id), productData);
    else await addDoc(collection(db, 'products'), productData);
    closeProductModal();
  } catch (err) { alert(err.message); }
  finally { setLoading(productSubmitBtn, false); }
});

window.deleteProduct = async (id) => {
  if (confirm('Delete this product?')) await deleteDoc(doc(db, 'products', id));
};

// ===== ইউজার =====
const userList = document.getElementById('userList');
onSnapshot(collection(db, 'users'), (snapshot) => {
  let html = '';
  snapshot.forEach(doc => {
    const u = doc.data();
    html += `<div class="glass-card"><p class="font-bold">${u.displayName || u.email}</p><p class="text-sm text-gray-500">${u.email}</p><p class="text-xs text-gray-400">${u.role || 'user'}</p></div>`;
  });
  userList.innerHTML = html;
});

// ===== কন্টাক্ট মেসেজ =====
const messageList = document.getElementById('messageList');
onSnapshot(collection(db, 'contactMessages'), (snapshot) => {
  document.getElementById('totalMessages').innerText = snapshot.size;
  let html = '';
  snapshot.forEach(doc => {
    const m = doc.data();
    html += `<div class="glass-card"><p><strong>${m.name}</strong> (${m.email})</p><p class="text-sm">${m.message}</p><p class="text-xs text-gray-400">${m.timestamp?.toDate?.()?.toLocaleString() || ''}</p></div>`;
  });
  messageList.innerHTML = html || '<p class="text-gray-500">No messages.</p>';
});

// ===== ফিক্স রিকোয়েস্ট (রিপ্লাই সহ) =====
const fixRequestList = document.getElementById('fixRequestList');
onSnapshot(collection(db, 'fixRequests'), (snapshot) => {
  document.getElementById('totalFixRequests').innerText = snapshot.size;
  let html = '';
  snapshot.forEach(doc => {
    const f = doc.data();
    const reply = f.reply || '';
    html += `
      <div class="glass-card" id="fix-${doc.id}">
        <p><strong>${f.name}</strong> (${f.email})</p>
        <p class="text-sm">${f.problem}</p>
        ${f.imageLink ? `<p class="text-xs text-gray-400">Image: ${f.imageLink}</p>` : ''}
        <div class="mt-3 border-t pt-3">
          <label class="text-sm font-semibold text-gray-700">Admin Reply:</label>
          <div class="flex gap-2 mt-1">
            <textarea id="reply-${doc.id}" rows="2" class="form-input flex-1 text-sm" placeholder="Write reply...">${reply}</textarea>
            <button onclick="sendReply('${doc.id}')" class="btn-primary text-sm py-2 px-4">Send</button>
          </div>
          ${reply ? `<p class="text-xs text-green-600 mt-1">✔ Reply sent: ${f.replyTimestamp?.toDate?.()?.toLocaleString() || ''}</p>` : ''}
        </div>
      </div>
    `;
  });
  fixRequestList.innerHTML = html || '<p class="text-gray-500">No fix requests.</p>';
});

// ===== রিপ্লাই পাঠানোর ফাংশন =====
window.sendReply = async (requestId) => {
  const textarea = document.getElementById(`reply-${requestId}`);
  const replyText = textarea.value.trim();
  if (!replyText) {
    alert('Please write a reply.');
    return;
  }
  try {
    await updateDoc(doc(db, 'fixRequests', requestId), {
      reply: replyText,
      replyTimestamp: serverTimestamp()
    });
    showToast('✅ Reply sent successfully!', 'success');
  } catch (err) {
    alert('Error: ' + err.message);
  }
};

// ===== সেটিংস =====
const settingsForm = document.getElementById('settingsForm');
const settingsBtn = settingsForm.querySelector('button[type="submit"]');
settingsForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const bkash = document.getElementById('bkashNumber').value.trim();
  const nagad = document.getElementById('nagadNumber').value.trim();
  const usdt = document.getElementById('usdtAddress').value.trim();
  setLoading(settingsBtn, true, 'Save Settings');
  try {
    await setDoc(doc(db, 'settings', 'payment'), { bkash, nagad, usdt });
    alert('Settings saved!');
  } catch (err) { alert('Error: ' + err.message); }
  finally { setLoading(settingsBtn, false); }
});

// ===== সাপোর্ট চ্যাট =====
const adminChatContainer = document.getElementById('adminChatContainer');
const adminChatForm = document.getElementById('adminChatForm');
const adminChatInput = document.getElementById('adminChatInput');
const chatSendBtn = adminChatForm.querySelector('button[type="submit"]');

onSnapshot(
  query(collection(db, 'messages'), where('participants', 'array-contains', 'admin'), orderBy('timestamp', 'asc')),
  (snapshot) => {
    adminChatContainer.innerHTML = '';
    snapshot.forEach(doc => {
      const msg = doc.data();
      const isAdmin = msg.fromUserId === 'admin';
      const div = document.createElement('div');
      div.className = isAdmin ? 'msg-admin' : 'msg-user';
      div.innerHTML = `${msg.content}<div class="msg-time">${msg.timestamp?.toDate?.()?.toLocaleString() || ''}</div>`;
      adminChatContainer.appendChild(div);
    });
    adminChatContainer.scrollTop = adminChatContainer.scrollHeight;
  }
);

adminChatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const content = adminChatInput.value.trim();
  if (!content) return;
  setLoading(chatSendBtn, true);
  try {
    await addDoc(collection(db, 'messages'), {
      fromUserId: 'admin',
      toUserId: 'all',
      content,
      timestamp: serverTimestamp(),
      participants: ['admin', 'all'],
      read: false
    });
    adminChatInput.value = '';
  } catch (err) { alert('Error: ' + err.message); }
  finally { setLoading(chatSendBtn, false); }
});

// ===== টোস্ট (শো টোস্ট ফাংশন) =====
window.showToast = function(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 4000);
};

// ===== লগআউট =====
window.logoutAdmin = () => { signOut(auth); window.location.href = 'admin-login.html'; };
window.updateOrderStatus = async (id, status) => {
  await updateDoc(doc(db, 'orders', id), { status });
};

// ===== ট্যাব সুইচ =====
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const tab = item.dataset.tab;
    const target = document.getElementById('tab-'+tab);
    if (target) target.classList.add('active');
    if (tab === 'dashboard') {
      setTimeout(() => {
        if (monthlyChart) monthlyChart.resize();
        if (statusChart) statusChart.resize();
      }, 100);
    }
  });
});
</script>
</body>
</html>
