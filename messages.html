<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #f2f4f7; color: #1c1c1e; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.6); }
    .btn-primary { background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; padding:12px 28px; border-radius:60px; font-weight:600; border:none; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.35); }
    .gradient-text { background: linear-gradient(135deg,#007AFF,#AF52DE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-link { position:relative; font-weight:500; color:#3a3a3c; transition:0.2s; cursor:pointer; text-decoration:none; }
    .nav-link:hover { color:#007AFF; }
    .glass-card { background:rgba(255,255,255,0.72); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.7); border-radius:16px; padding:1.5rem; }
    .form-input { width:100%; padding:14px 18px; border:1.5px solid rgba(60,60,67,0.08); border-radius:14px; font-size:1rem; background:rgba(255,255,255,0.8); }
    .form-input:focus { outline:none; border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.08); }
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; background:white; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.1); min-width:200px; padding:8px 0; border:1px solid rgba(0,0,0,0.04); z-index:100; }
    .dropdown-menu a { display:block; padding:10px 20px; color:#1c1c1e; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .dropdown-menu a:hover { background:#f0f0f5; }
    .dropdown-menu.show { display:block; }
    .profile-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#007AFF,#5856D6); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; }
    .social-icon { display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:60px; background:rgba(255,255,255,0.8); backdrop-filter:blur(4px); color:#3a3a3c; text-decoration:none; border:1px solid rgba(60,60,67,0.08); transition:0.3s; }
    .social-icon:hover { background:#007AFF; color:#fff; transform:translateY(-4px); box-shadow:0 8px 20px rgba(0,122,255,0.2); border-color:#007AFF; }
    .cart-badge { background:#007AFF; color:white; border-radius:50%; padding:2px 8px; font-size:0.7rem; font-weight:700; }
    .page-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1 0 auto; }
    #toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 100%;
    }
    .toast {
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      font-size: 0.95rem;
      font-weight: 500;
      color: #1c1c1e;
      transform: translateX(calc(100% + 30px));
      animation: slideIn 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.success { border-left: 4px solid #34C759; }
    .toast.error { border-left: 4px solid #FF3B30; }
    .toast.warning { border-left: 4px solid #FF9500; }
    .toast i { font-size: 1.2rem; }
    .toast.success i { color: #34C759; }
    .toast.error i { color: #FF3B30; }
    .toast.warning i { color: #FF9500; }
    @keyframes slideIn { to { transform: translateX(0); } }
    .toast.hide { animation: slideOut 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes slideOut { to { transform: translateX(calc(100% + 30px)); opacity: 0; } }
    /* চ্যাট স্টাইল */
    .chat-container { max-height: 65vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 4px; }
    .msg-user { align-self: flex-end; background: #007AFF; color: white; border-radius: 18px 18px 0 18px; padding: 10px 16px; max-width: 80%; }
    .msg-admin { align-self: flex-start; background: #e5e5ea; color: #1c1c1e; border-radius: 18px 18px 18px 0; padding: 10px 16px; max-width: 80%; }
    .msg-time { font-size: 0.6rem; opacity: 0.7; margin-top: 4px; text-align: right; }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900">Support Chat</h1>
        <div class="glass-card mt-6">
          <div id="chatMessages" class="chat-container"></div>
          <form id="chatForm" class="mt-4 flex gap-2">
            <input type="text" id="chatInput" placeholder="Type a message..." class="form-input flex-1" required />
            <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i></button>
          </form>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- অথ মডাল -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, signOut, onAuthStateChanged, doc, getDoc, signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth } from './components.js';

    renderNavbar();
    renderFooter();

    // ===== TOAST =====
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, 4500);
    };

    // ===== AUTH =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ সাইন ইন সফল!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ অ্যাকাউন্ট তৈরি হয়েছে!', 'success');
        }
        closeAuthModal();
        document.getElementById('authForm').reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      }
    });

    // ===== AUTH STATE =====
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      let name = null;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      updateNavbarAuth(user, name);

      // চ্যাট লোড
      const q = query(
        collection(db, 'messages'),
        where('participants', 'array-contains', user.uid),
        orderBy('timestamp', 'asc')
      );
      onSnapshot(q, (snapshot) => {
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          const isUser = msg.fromUserId === user.uid;
          const div = document.createElement('div');
          div.className = isUser ? 'msg-user' : 'msg-admin';
          div.innerHTML = `${msg.content}<div class="msg-time">${msg.timestamp?.toDate?.()?.toLocaleTimeString() || ''}</div>`;
          chatMessages.appendChild(div);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    });

    // ===== মেসেজ পাঠানো =====
    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('chatInput').value.trim();
      if (!content) return;
      const user = auth.currentUser;
      if (!user) return showToast('আপনি লগইন নেই', 'error');
      try {
        await addDoc(collection(db, 'messages'), {
          fromUserId: user.uid,
          toUserId: 'admin',
          content,
          timestamp: serverTimestamp(),
          participants: [user.uid, 'admin'],
          read: false
        });
        document.getElementById('chatInput').value = '';
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    });

    window.handleLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
