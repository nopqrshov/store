<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – SWD Store</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* (আপনার আগের স্টাইল একই থাকবে) */
    .messenger-wrap { display: flex; flex-direction: column; height: 70vh; min-height: 460px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.04); border:1px solid rgba(0,0,0,0.04); }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.04); font-weight: 600; background: #fafafc; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-header .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:1rem; }
    .chat-header .chat-info { flex:1; }
    .chat-header .chat-info .name { font-weight:600; color:#1c1c1e; }
    .chat-header .chat-info .status { font-size:0.75rem; color:#34C759; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:6px; background:#f8f9fc; }
    .chat-msg { max-width:78%; padding:10px 16px; border-radius:18px; font-size:0.95rem; word-wrap:break-word; position:relative; animation:fadeUp 0.2s ease; }
    .chat-msg.sent { align-self:flex-end; background:#007AFF; color:#fff; border-bottom-right-radius:4px; }
    .chat-msg.received { align-self:flex-start; background:#fff; color:#1c1c1e; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .chat-msg .msg-time { font-size:0.6rem; opacity:0.6; margin-top:4px; text-align:right; }
    .chat-msg.sent .msg-time { color:rgba(255,255,255,0.7); }
    .chat-msg .msg-status { font-size:0.6rem; margin-left:6px; opacity:0.6; }
    .chat-input-wrap { display:flex; gap:10px; padding:12px 20px; border-top:1px solid rgba(0,0,0,0.04); background:#fff; flex-shrink:0; }
    .chat-input-wrap input { flex:1; padding:12px 18px; border-radius:30px; border:1.5px solid rgba(60,60,67,0.08); font-size:0.95rem; transition:0.2s; background:#f5f5f8; }
    .chat-input-wrap input:focus { outline:none; border-color:#007AFF; background:#fff; box-shadow:0 0 0 4px rgba(0,122,255,0.06); }
    .chat-input-wrap button { border-radius:50%; width:48px; height:48px; padding:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#007AFF,#5856D6); color:#fff; border:none; cursor:pointer; transition:0.2s; font-size:1.1rem; flex-shrink:0; }
    .chat-input-wrap button:hover { transform:scale(1.03); box-shadow:0 4px 16px rgba(0,122,255,0.3); }
    .chat-input-wrap button:disabled { opacity:0.5; transform:none !important; }
    .empty-state { display:flex; align-items:center; justify-content:center; height:100%; color:#8e8e93; font-size:0.95rem; flex-direction:column; gap:8px; }
    .empty-state i { font-size:2.4rem; opacity:0.3; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:#d0d0d5; border-radius:10px; }
    .chat-messages::-webkit-scrollbar-track { background:transparent; }
    @media (max-width:640px) { .chat-msg { max-width:92%; } .messenger-wrap { height:75vh; min-height:400px; } }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-28 pb-16 px-6 max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Support Chat</h1>
        <p class="text-gray-500 mb-6">Chat directly with our support team.</p>

        <div class="messenger-wrap">
          <div class="chat-header">
            <div class="chat-avatar"><i class="fas fa-headset"></i></div>
            <div class="chat-info">
              <div class="name">Admin Support</div>
              <div class="status"><i class="fas fa-circle text-green-500 text-xs"></i> Online</div>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="empty-state"><i class="fas fa-inbox"></i><span>No messages yet. Start the conversation!</span></div>
          </div>
          <form class="chat-input-wrap" id="chatForm">
            <input type="text" id="chatInput" placeholder="Type a message..." required autocomplete="off" />
            <button type="submit" id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
          </form>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- অথ মডাল (ফরগট পাসওয়ার্ড সহ) -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-2 text-sm text-center">
        <a href="#" onclick="window.showResetPasswordModal()" class="text-blue-600 hover:underline">
          <i class="fas fa-key"></i> Forgot Password?
        </a>
      </p>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db, collection, doc, getDoc, setDoc, addDoc, onSnapshot, query, where, serverTimestamp, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateDoc, sendEmailVerification } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, renderCartSidebar, setLoading } from './components.js';

    renderNavbar();
    renderFooter();
    renderCartSidebar();
    updateCartBadge();

    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ===== অথ মডাল =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          if (!userCred.user.emailVerified) {
            await signOut(auth);
            throw new Error('Please verify your email first.');
          }
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await sendEmailVerification(userCred.user);
          showToast('✅ Verification email sent!', 'warning');
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          await signOut(auth);
          alert('Please verify your email before signing in.');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    // ===== চ্যাট লজিক (পুরনো) =====
    const chatMessages = document.getElementById('chatMessages');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    let currentUser = null;
    let conversationId = null;
    let unsubMessages = null;

    function renderMessages(msgs) {
      if (!msgs || msgs.length === 0) {
        chatMessages.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots"></i><span>No messages yet. Start the conversation!</span></div>`;
        return;
      }
      let html = '';
      msgs.forEach(m => {
        const isSent = m.fromUserId === currentUser?.uid;
        const time = m.timestamp?.toDate?.()?.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit' }) || '';
        let statusHtml = '';
        if (isSent) {
          const readStatus = m.read ? '✓✓' : '✓';
          statusHtml = `<span class="msg-status">${readStatus}</span>`;
        }
        html += `
          <div class="chat-msg ${isSent ? 'sent' : 'received'}">
            ${m.content}
            <div class="msg-time">${time} ${statusHtml}</div>
          </div>
        `;
      });
      chatMessages.innerHTML = html;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      const displayName = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      updateNavbarAuth(user, displayName);

      conversationId = `conv_${user.uid}_admin`;

      if (unsubMessages) unsubMessages();
      const q = query(collection(db, 'messages'), where('conversationId', '==', conversationId));
      unsubMessages = onSnapshot(q, (snapshot) => {
        const msgs = [];
        snapshot.forEach(doc => {
          msgs.push({ id: doc.id, ...doc.data() });
        });
        msgs.sort((a, b) => {
          const ta = a.timestamp?.toDate?.()?.getTime() || 0;
          const tb = b.timestamp?.toDate?.()?.getTime() || 0;
          return ta - tb;
        });
        renderMessages(msgs);

        const unreadAdminMsgs = msgs.filter(m => m.fromUserId === 'admin' && !m.read);
        if (unreadAdminMsgs.length > 0) {
          unreadAdminMsgs.forEach(async (m) => {
            await updateDoc(doc(db, 'messages', m.id), { read: true, readAt: serverTimestamp() });
          });
        }
      }, (error) => {
        console.error('Snapshot error:', error);
        showToast('Error loading messages: ' + error.message, 'error');
      });
    });

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = chatInput.value.trim();
      if (!content) return;
      if (!currentUser) {
        showToast('Please sign in first.', 'warning');
        return;
      }
      if (!conversationId) {
        showToast('Conversation not ready. Please refresh.', 'error');
        return;
      }

      setLoading(chatSendBtn, true);
      try {
        await addDoc(collection(db, 'messages'), {
          conversationId: conversationId,
          fromUserId: currentUser.uid,
          toUserId: 'admin',
          content,
          timestamp: serverTimestamp(),
          read: false,
          participants: [currentUser.uid, 'admin']
        });
        chatInput.value = '';
        showToast('Message sent', 'success');
      } catch (err) {
        console.error('Send error:', err);
        showToast('Error sending message: ' + err.message, 'error');
      } finally {
        setLoading(chatSendBtn, false);
        chatInput.focus();
      }
    });

    window.handleLogout = async () => {
      if (unsubMessages) unsubMessages();
      await signOut(auth);
      window.location.href = 'index.html';
    };

    window.addEventListener('beforeunload', () => {
      if (unsubMessages) unsubMessages();
    });
  </script>
</body>
</html>
