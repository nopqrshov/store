<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get New Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-24 pb-12 px-6">
        <div class="max-w-7xl mx-auto">
          <h1 class="text-3xl font-bold text-gray-900">Choose Your Website Package</h1>
          <div id="productGrid" class="grid md:grid-cols-3 gap-6 mt-8"></div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- কার্ট সাইডবার -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold">Your Cart</h2>
      <button onclick="toggleCart()" class="text-gray-500"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItems" class="space-y-4"></div>
    <div class="mt-6 border-t pt-4">
      <div class="flex justify-between font-bold">
        <span>Total:</span>
        <span id="cartTotal">$0</span>
      </div>
      <button onclick="checkout()" class="btn-primary w-full mt-4 justify-center">Proceed to Checkout</button>
    </div>
  </div>

  <!-- অথ মডাল -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <p class="mt-4 text-sm text-gray-500 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <!-- পেমেন্ট মডাল -->
  <div id="paymentModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[300] hidden">
    <div class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold">Complete Payment</h3>
        <button onclick="closePaymentModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div id="paymentDetails" class="space-y-3 text-sm bg-gray-50 p-4 rounded-xl">
        <p class="font-semibold">Send payment to any of these:</p>
        <div id="paymentNumbers" class="space-y-2"></div>
      </div>
      <form id="paymentForm" class="mt-4 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700">Transaction ID *</label>
          <input type="text" id="transactionId" placeholder="Enter your payment transaction ID" required class="form-input" />
        </div>
        <button type="submit" class="btn-primary w-full justify-center">
          <i class="fas fa-check"></i> Confirm Payment
        </button>
        <div id="paymentError" class="text-red-500 text-sm hidden"></div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db, collection, doc, getDoc, onSnapshot, addDoc, updateDoc, serverTimestamp, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setDoc } from './firebase-config.js';
    import { renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge } from './components.js';

    renderNavbar();
    renderFooter();

    // ✅ কার্ট আইকনে ক্লিক করলে সাইডবার টগল
    const cartIcon = document.getElementById('cartIconLink');
    if (cartIcon) {
      cartIcon.addEventListener('click', (e) => {
        e.preventDefault();
        toggleCart();
      });
    }

    // ===== TOAST =====
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, 4500);
    };

    // ===== AUTH =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ সাইন ইন সফল!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ অ্যাকাউন্ট তৈরি হয়েছে!', 'success');
        }
        closeAuthModal();
        document.getElementById('authForm').reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      }
    });

    // ===== AUTH STATE =====
    onAuthStateChanged(auth, async (user) => {
      let name = null;
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
      }
      updateNavbarAuth(user, name);
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ লগআউট সফল', 'success');
    };

    // ===== PRODUCTS & CART =====
    const productGrid = document.getElementById('productGrid');
    let products = [];
    onSnapshot(collection(db, 'products'), (snapshot) => {
      products = [];
      snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
      renderProducts();
    });
    const renderProducts = () => {
      productGrid.innerHTML = products.map(p => `
        <div class="glass-card">
          <h3 class="font-bold text-xl">${p.name}</h3>
          <p class="text-sm text-gray-500 mt-1">${p.description || ''}</p>
          <p class="text-2xl font-bold text-blue-600 mt-2">$${p.price}</p>
          <button onclick="addToCart('${p.id}')" class="btn-primary text-sm py-2 px-4 mt-3">Add to Cart</button>
        </div>
      `).join('');
    };
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentOrderId = null;

    const updateCartUI = () => {
      updateCartBadge();
      const cartItemsDiv = document.getElementById('cartItems');
      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<p class="text-gray-500">Your cart is empty.</p>';
        document.getElementById('cartTotal').textContent = '$0';
        return;
      }
      let total = 0;
      cartItemsDiv.innerHTML = cart.map((item, index) => {
        total += item.price;
        return `
          <div class="flex justify-between items-center border-b pb-2">
            <div>
              <span class="font-medium">${item.name}</span>
              <span class="text-sm text-gray-500">$${item.price}</span>
            </div>
            <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
          </div>
        `;
      }).join('');
      document.getElementById('cartTotal').textContent = `$${total}`;
    };
    window.addToCart = (productId) => {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      cart.push({ id: product.id, name: product.name, price: product.price });
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartUI();
      showToast(`✅ "${product.name}" কার্টে যোগ হয়েছে`, 'success');
    };
    window.removeFromCart = (index) => {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartUI();
    };
    window.toggleCart = () => {
      document.getElementById('cartSidebar').classList.toggle('open');
      document.getElementById('cartOverlay').classList.toggle('open');
    };
    updateCartUI();

    // ===== PAYMENT =====
    let paymentSettings = { bkash: '', nagad: '', usdt: '' };
    const loadPaymentSettings = async () => {
      try {
        const docSnap = await getDoc(doc(db, 'settings', 'payment'));
        if (docSnap.exists()) paymentSettings = docSnap.data();
      } catch (e) { console.error(e); }
    };
    window.openPaymentModal = (orderId) => {
      currentOrderId = orderId;
      const numbersDiv = document.getElementById('paymentNumbers');
      let html = '';
      if (paymentSettings.bkash) html += `<p><i class="fas fa-mobile-alt text-blue-500"></i> BKash: <strong>${paymentSettings.bkash}</strong></p>`;
      if (paymentSettings.nagad) html += `<p><i class="fas fa-mobile-alt text-orange-500"></i> Nagad: <strong>${paymentSettings.nagad}</strong></p>`;
      if (paymentSettings.usdt) html += `<p><i class="fab fa-bitcoin text-yellow-500"></i> USDT (BEP20): <strong>${paymentSettings.usdt}</strong></p>`;
      if (!html) html = '<p class="text-gray-500">পেমেন্ট পদ্ধতি সেট করা হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।</p>';
      numbersDiv.innerHTML = html;
      document.getElementById('paymentModal').classList.remove('hidden');
      document.getElementById('paymentError').classList.add('hidden');
      document.getElementById('transactionId').value = '';
    };
    window.closePaymentModal = () => {
      document.getElementById('paymentModal').classList.add('hidden');
      currentOrderId = null;
    };
    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const txnId = document.getElementById('transactionId').value.trim();
      const errorDiv = document.getElementById('paymentError');
      errorDiv.classList.add('hidden');
      if (!txnId) {
        errorDiv.textContent = 'দয়া করে ট্রানজেকশন ID দিন।';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (!currentOrderId) {
        errorDiv.textContent = 'অর্ডার পাওয়া যায়নি।';
        errorDiv.classList.remove('hidden');
        return;
      }
      try {
        await updateDoc(doc(db, 'orders', currentOrderId), {
          transactionId: txnId,
          paymentMethod: 'Manual',
          status: 'processing'
        });
        showToast('✅ পেমেন্ট কনফর্ম! অ্যাডমিন শীঘ্রই ভেরিফাই করবেন।', 'success');
        closePaymentModal();
        cart = [];
        localStorage.removeItem('cart');
        updateCartUI();
        toggleCart();
      } catch (err) {
        errorDiv.textContent = '⚠️ ' + err.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + err.message, 'error');
      }
    });

    // ===== CHECKOUT =====
    window.checkout = async () => {
      if (cart.length === 0) {
        showToast('🛒 আপনার কার্ট খালি', 'warning');
        return;
      }
      const user = auth.currentUser;
      if (!user) {
        showToast('⚠️ চেকআউট করতে দয়া করে সাইন ইন করুন', 'error');
        openAuthModal('signin');
        return;
      }
      await loadPaymentSettings();
      if (!paymentSettings.bkash && !paymentSettings.nagad && !paymentSettings.usdt) {
        showToast('⚠️ পেমেন্ট পদ্ধতি সেট করা হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।', 'error');
        return;
      }
      const orderData = {
        userId: user.uid,
        items: cart,
        total: cart.reduce((sum, i) => sum + i.price, 0),
        status: 'pending',
        paymentMethod: '',
        transactionId: '',
        createdAt: serverTimestamp(),
      };
      try {
        const docRef = await addDoc(collection(db, 'orders'), orderData);
        openPaymentModal(docRef.id);
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };
  </script>
</body>
</html>
