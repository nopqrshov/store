<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get New Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #f2f4f7; color: #1c1c1e; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.6); }
    .btn-primary { background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; padding:12px 28px; border-radius:60px; font-weight:600; border:none; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.35); }
    .gradient-text { background: linear-gradient(135deg,#007AFF,#AF52DE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-link { position:relative; font-weight:500; color:#3a3a3c; transition:0.2s; cursor:pointer; }
    .nav-link:hover { color:#007AFF; }
    .glass-card { background:rgba(255,255,255,0.72); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.7); border-radius:16px; padding:1.5rem; transition:0.3s; }
    .glass-card:hover { transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.06); }
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; background:white; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.1); min-width:200px; padding:8px 0; border:1px solid rgba(0,0,0,0.04); z-index:100; }
    .dropdown-menu a { display:block; padding:10px 20px; color:#1c1c1e; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .dropdown-menu a:hover { background:#f0f0f5; }
    .dropdown-menu.show { display:block; }
    .profile-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#007AFF,#5856D6); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; }
    .cart-badge { background:#007AFF; color:white; border-radius:50%; padding:2px 8px; font-size:0.7rem; font-weight:700; }
    .cart-sidebar { position:fixed; right:-400px; top:0; width:380px; height:100%; background:white; box-shadow:-10px 0 40px rgba(0,0,0,0.1); transition:0.4s cubic-bezier(0.25,0.46,0.45,0.94); z-index:200; padding:1.5rem; overflow-y:auto; }
    .cart-sidebar.open { right:0; }
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.2); backdrop-filter:blur(4px); z-index:199; display:none; }
    .cart-overlay.open { display:block; }
    .form-input { width:100%; padding:14px 18px; border:1.5px solid rgba(60,60,67,0.08); border-radius:14px; font-size:1rem; background:rgba(255,255,255,0.8); }
    .form-input:focus { outline:none; border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.08); }

    #toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 100%;
    }
    .toast {
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      font-size: 0.95rem;
      font-weight: 500;
      color: #1c1c1e;
      transform: translateX(calc(100% + 30px));
      animation: slideIn 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.success { border-left: 4px solid #34C759; }
    .toast.error { border-left: 4px solid #FF3B30; }
    .toast.warning { border-left: 4px solid #FF9500; }
    .toast i { font-size: 1.2rem; }
    .toast.success i { color: #34C759; }
    .toast.error i { color: #FF3B30; }
    .toast.warning i { color: #FF9500; }
    @keyframes slideIn { to { transform: translateX(0); } }
    .toast.hide { animation: slideOut 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes slideOut { to { transform: translateX(calc(100% + 30px)); opacity: 0; } }
  </style>
</head>
<body>

<!-- নেভবার (✅ মেসেজ আইকন যুক্ত) -->
<nav class="fixed top-0 left-0 w-full glass z-50 h-16 md:h-20 flex items-center px-6 sm:px-8 lg:px-12">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <a href="index.html" class="text-xl md:text-2xl font-bold text-gray-900">
      SWD <span class="gradient-text">Store</span>
    </a>
    <div class="flex items-center gap-4">
      <!-- ✅ মেসেজ আইকন (কার্টের বামে) -->
      <a href="messages.html" class="text-gray-700 hover:text-blue-500 text-xl" title="Messages">
        <i class="fas fa-envelope"></i>
      </a>
      <!-- কার্ট আইকন -->
      <button onclick="toggleCart()" class="relative text-gray-700">
        <i class="fas fa-shopping-cart text-xl"></i>
        <span id="cartCount" class="cart-badge absolute -top-2 -right-3">0</span>
      </button>
      <!-- অথ বাটন / প্রোফাইল -->
      <div id="auth-buttons" class="flex items-center gap-3">
        <a href="#" onclick="openAuthModal('signin')" class="nav-link text-sm">Sign In</a>
        <a href="#" onclick="openAuthModal('signup')" class="btn-primary text-sm py-2 px-5">Get Started</a>
      </div>
      <div id="profile-section" class="relative hidden">
        <div class="profile-avatar" id="profileAvatar">S</div>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="my-profile.html"><i class="fas fa-user mr-2"></i> My Profile</a>
          <a href="my-orders.html"><i class="fas fa-box mr-2"></i> My Orders</a>
          <a href="settings.html"><i class="fas fa-cog mr-2"></i> Settings</a>
          <a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- মূল কন্টেন্ট -->
<section class="pt-24 pb-12 px-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900">Choose Your Website Package</h1>
    <div id="productGrid" class="grid md:grid-cols-3 gap-6 mt-8"></div>
  </div>
</section>

<!-- কার্ট সাইডবার -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold">Your Cart</h2>
    <button onclick="toggleCart()" class="text-gray-500"><i class="fas fa-times"></i></button>
  </div>
  <div id="cartItems" class="space-y-4"></div>
  <div class="mt-6 border-t pt-4">
    <div class="flex justify-between font-bold">
      <span>Total:</span>
      <span id="cartTotal">$0</span>
    </div>
    <button onclick="checkout()" class="btn-primary w-full mt-4 justify-center">Proceed to Checkout</button>
  </div>
</div>

<!-- অথ মডাল -->
<div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
    <div class="flex justify-between items-center mb-4">
      <h3 id="authModalTitle" class="text-2xl font-bold">Sign In</h3>
      <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
    </div>
    <form id="authForm" class="space-y-4">
      <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
      <input type="password" id="authPassword" placeholder="Password" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500" />
      <button type="submit" class="btn-primary w-full justify-center">Continue</button>
    </form>
    <p class="mt-4 text-sm text-gray-500 text-center">
      <span id="authToggleText">Don't have an account?</span>
      <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
    </p>
    <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
  </div>
</div>

<!-- পেমেন্ট মডাল -->
<div id="paymentModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[300] hidden">
  <div class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-bold">Complete Payment</h3>
      <button onclick="closePaymentModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
    </div>
    <div id="paymentDetails" class="space-y-3 text-sm bg-gray-50 p-4 rounded-xl">
      <p class="font-semibold">Send payment to any of these:</p>
      <div id="paymentNumbers" class="space-y-2"></div>
    </div>
    <form id="paymentForm" class="mt-4 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700">Transaction ID *</label>
        <input type="text" id="transactionId" placeholder="Enter your payment transaction ID" required class="form-input" />
      </div>
      <button type="submit" class="btn-primary w-full justify-center">
        <i class="fas fa-check"></i> Confirm Payment
      </button>
      <div id="paymentError" class="text-red-500 text-sm hidden"></div>
    </form>
  </div>
</div>

<!-- টোস্ট -->
<div id="toast-container"></div>

<script type="module">
import { auth, db, collection, doc, getDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, query, where, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setDoc } from './firebase-config.js';

// ===== TOAST =====
window.showToast = (message, type = 'success') => {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
};

// ===== AUTH =====
let currentAuthMode = 'signin';
window.openAuthModal = (mode) => {
  currentAuthMode = mode;
  document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
  document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
  document.getElementById('authError').classList.add('hidden');
  document.getElementById('authModal').classList.remove('hidden');
};
window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
document.getElementById('authToggleLink').addEventListener('click', (e) => {
  e.preventDefault();
  currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
  window.openAuthModal(currentAuthMode);
});
document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const errorDiv = document.getElementById('authError');
  errorDiv.classList.add('hidden');
  try {
    let userCred;
    if (currentAuthMode === 'signin') {
      userCred = await signInWithEmailAndPassword(auth, email, password);
      showToast('✅ সাইন ইন সফল!', 'success');
    } else {
      userCred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', userCred.user.uid), {
        email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
      });
      showToast('✅ অ্যাকাউন্ট তৈরি হয়েছে!', 'success');
    }
    closeAuthModal();
    document.getElementById('authForm').reset();
  } catch (error) {
    errorDiv.textContent = error.message;
    errorDiv.classList.remove('hidden');
    showToast('⚠️ ' + error.message, 'error');
  }
});

// ===== PROFILE =====
const authBtns = document.getElementById('auth-buttons');
const profileSection = document.getElementById('profile-section');
const profileAvatar = document.getElementById('profileAvatar');
const dropdownMenu = document.getElementById('dropdownMenu');
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authBtns.classList.add('hidden');
    profileSection.classList.remove('hidden');
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    const name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
    profileAvatar.textContent = name.charAt(0).toUpperCase();
  } else {
    authBtns.classList.remove('hidden');
    profileSection.classList.add('hidden');
  }
});
profileAvatar.addEventListener('click', () => dropdownMenu.classList.toggle('show'));
document.addEventListener('click', (e) => {
  if (!profileSection.contains(e.target)) dropdownMenu.classList.remove('show');
});
window.handleLogout = async () => {
  await signOut(auth);
  dropdownMenu.classList.remove('show');
  showToast('✅ লগআউট সফল', 'success');
};
window.navigateTo = (page) => {
  dropdownMenu.classList.remove('show');
  if (page === 'my-profile') showToast('📄 প্রোফাইল পেজ শীঘ্রই আসছে', 'warning');
  else if (page === 'my-orders') showToast('📦 আপনার অর্ডার তালিকা', 'warning');
  else if (page === 'settings') showToast('⚙️ সেটিংস পেজ', 'warning');
};

// ===== PRODUCTS & CART =====
const productGrid = document.getElementById('productGrid');
let products = [];
onSnapshot(collection(db, 'products'), (snapshot) => {
  products = [];
  snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
  renderProducts();
});
const renderProducts = () => {
  productGrid.innerHTML = products.map(p => `
    <div class="glass-card">
      <h3 class="font-bold text-xl">${p.name}</h3>
      <p class="text-sm text-gray-500 mt-1">${p.description || ''}</p>
      <p class="text-2xl font-bold text-blue-600 mt-2">$${p.price}</p>
      <button onclick="addToCart('${p.id}')" class="btn-primary text-sm py-2 px-4 mt-3">Add to Cart</button>
    </div>
  `).join('');
};
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let currentOrderId = null;

const updateCartUI = () => {
  document.getElementById('cartCount').textContent = cart.length;
  const cartItemsDiv = document.getElementById('cartItems');
  if (cart.length === 0) {
    cartItemsDiv.innerHTML = '<p class="text-gray-500">Your cart is empty.</p>';
    document.getElementById('cartTotal').textContent = '$0';
    return;
  }
  let total = 0;
  cartItemsDiv.innerHTML = cart.map((item, index) => {
    total += item.price;
    return `
      <div class="flex justify-between items-center border-b pb-2">
        <div>
          <span class="font-medium">${item.name}</span>
          <span class="text-sm text-gray-500">$${item.price}</span>
        </div>
        <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
      </div>
    `;
  }).join('');
  document.getElementById('cartTotal').textContent = `$${total}`;
};
window.addToCart = (productId) => {
  const product = products.find(p => p.id === productId);
  if (!product) return;
  cart.push({ id: product.id, name: product.name, price: product.price });
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartUI();
  showToast(`✅ "${product.name}" কার্টে যোগ হয়েছে`, 'success');
};
window.removeFromCart = (index) => {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartUI();
};
window.toggleCart = () => {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
};
updateCartUI();

// ===== PAYMENT =====
let paymentSettings = { bkash: '', nagad: '', usdt: '' };
const loadPaymentSettings = async () => {
  try {
    const docSnap = await getDoc(doc(db, 'settings', 'payment'));
    if (docSnap.exists()) paymentSettings = docSnap.data();
  } catch (e) { console.error(e); }
};
window.openPaymentModal = (orderId) => {
  currentOrderId = orderId;
  const numbersDiv = document.getElementById('paymentNumbers');
  let html = '';
  if (paymentSettings.bkash) html += `<p><i class="fas fa-mobile-alt text-blue-500"></i> BKash: <strong>${paymentSettings.bkash}</strong></p>`;
  if (paymentSettings.nagad) html += `<p><i class="fas fa-mobile-alt text-orange-500"></i> Nagad: <strong>${paymentSettings.nagad}</strong></p>`;
  if (paymentSettings.usdt) html += `<p><i class="fab fa-bitcoin text-yellow-500"></i> USDT (BEP20): <strong>${paymentSettings.usdt}</strong></p>`;
  if (!html) html = '<p class="text-gray-500">পেমেন্ট পদ্ধতি সেট করা হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।</p>';
  numbersDiv.innerHTML = html;
  document.getElementById('paymentModal').classList.remove('hidden');
  document.getElementById('paymentError').classList.add('hidden');
  document.getElementById('transactionId').value = '';
};
window.closePaymentModal = () => {
  document.getElementById('paymentModal').classList.add('hidden');
  currentOrderId = null;
};
document.getElementById('paymentForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const txnId = document.getElementById('transactionId').value.trim();
  const errorDiv = document.getElementById('paymentError');
  errorDiv.classList.add('hidden');
  if (!txnId) {
    errorDiv.textContent = 'দয়া করে ট্রানজেকশন ID দিন।';
    errorDiv.classList.remove('hidden');
    return;
  }
  if (!currentOrderId) {
    errorDiv.textContent = 'অর্ডার পাওয়া যায়নি।';
    errorDiv.classList.remove('hidden');
    return;
  }
  try {
    await updateDoc(doc(db, 'orders', currentOrderId), {
      transactionId: txnId,
      paymentMethod: 'Manual',
      status: 'processing'
    });
    showToast('✅ পেমেন্ট কনফর্ম! অ্যাডমিন শীঘ্রই ভেরিফাই করবেন।', 'success');
    closePaymentModal();
    cart = [];
    localStorage.removeItem('cart');
    updateCartUI();
    toggleCart();
  } catch (err) {
    errorDiv.textContent = '⚠️ ' + err.message;
    errorDiv.classList.remove('hidden');
    showToast('⚠️ ' + err.message, 'error');
  }
});

// ===== CHECKOUT =====
window.checkout = async () => {
  if (cart.length === 0) {
    showToast('🛒 আপনার কার্ট খালি', 'warning');
    return;
  }
  const user = auth.currentUser;
  if (!user) {
    showToast('⚠️ চেকআউট করতে দয়া করে সাইন ইন করুন', 'error');
    openAuthModal('signin');
    return;
  }
  await loadPaymentSettings();
  if (!paymentSettings.bkash && !paymentSettings.nagad && !paymentSettings.usdt) {
    showToast('⚠️ পেমেন্ট পদ্ধতি সেট করা হয়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।', 'error');
    return;
  }
  const orderData = {
    userId: user.uid,
    items: cart,
    total: cart.reduce((sum, i) => sum + i.price, 0),
    status: 'pending',
    paymentMethod: '',
    transactionId: '',
    createdAt: serverTimestamp(),
  };
  try {
    const docRef = await addDoc(collection(db, 'orders'), orderData);
    openPaymentModal(docRef.id);
  } catch (err) {
    showToast('⚠️ ' + err.message, 'error');
  }
};
</script>
</body>
</html>
