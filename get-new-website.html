<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get New Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* স্টোর পেজের অতিরিক্ত স্টাইল */
    .rating-stars { color: #f59e0b; font-size: 1.25rem; }
    .rating-stars .star { cursor: pointer; transition: 0.2s; }
    .rating-stars .star:hover { transform: scale(1.2); }
    .wishlist-btn { transition: 0.3s; }
    .wishlist-btn.active { color: #ef4444; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <section class="pt-24 pb-12 px-6">
        <div class="max-w-7xl mx-auto">
          <h1 class="text-3xl font-bold dark:text-white">Choose Your Website Package</h1>
          
          <!-- ===== ফিল্টার, সার্চ, সর্ট ===== -->
          <div class="flex flex-wrap gap-4 mt-4 items-center">
            <div class="relative flex-1 min-w-[200px]">
              <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
              <input type="text" id="searchInput" placeholder="Search packages..." class="form-input pl-10" />
            </div>
            <select id="categoryFilter" class="form-input max-w-xs">
              <option value="all">All Categories</option>
              <option value="static">Static</option>
              <option value="spa">SPA</option>
              <option value="dynamic">Dynamic</option>
              <option value="ecommerce">E-Commerce</option>
            </select>
            <select id="sortFilter" class="form-input max-w-xs">
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="name">Name: A to Z</option>
            </select>
            <button onclick="resetFilters()" class="btn-outline text-sm py-2 px-4">
              <i class="fas fa-undo"></i> Reset
            </button>
          </div>

          <!-- ===== প্রোডাক্ট গ্রিড ===== -->
          <div id="productGrid" class="grid md:grid-cols-3 gap-6 mt-8"></div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- ===== প্রোডাক্ট ডিটেইল মডাল ===== -->
  <div id="productDetailModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[300] hidden">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 id="detailName" class="text-2xl font-bold dark:text-white"></h3>
        <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <img id="detailImage" src="" alt="" class="w-full h-64 object-cover rounded-lg mb-4" />
      <p id="detailDesc" class="text-gray-600 dark:text-gray-300"></p>
      <p id="detailPrice" class="text-2xl font-bold text-blue-600 dark:text-blue-400 mt-2"></p>
      <div id="detailRating" class="mt-2 text-yellow-500"></div>
      <div id="detailStock" class="text-sm text-green-600 dark:text-green-400 mt-1"></div>
      <div class="mt-4 flex flex-wrap gap-3">
        <button onclick="window.addToCartFromDetail()" class="btn-primary">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
        <button onclick="window.toggleWishlistFromDetail()" class="btn-outline" id="detailWishlistBtn">
          <i class="fas fa-heart"></i> Wishlist
        </button>
        <button onclick="window.buyNowFromDetail()" class="btn-primary" style="background:linear-gradient(135deg,#34C759,#28A745);">
          <i class="fas fa-bolt"></i> Buy Now
        </button>
      </div>
      <!-- ===== রেটিং ফর্ম ===== -->
      <div class="mt-6 border-t dark:border-gray-700 pt-4">
        <h4 class="font-semibold dark:text-white">Rate this product</h4>
        <div class="rating-stars flex gap-2 mt-2" id="ratingStars">
          <span class="star" data-val="1">☆</span>
          <span class="star" data-val="2">☆</span>
          <span class="star" data-val="3">☆</span>
          <span class="star" data-val="4">☆</span>
          <span class="star" data-val="5">☆</span>
        </div>
        <textarea id="ratingReview" placeholder="Write a review..." class="form-input mt-2" rows="2"></textarea>
        <button onclick="submitRating()" class="btn-primary mt-2 text-sm py-2 px-4">
          <i class="fas fa-paper-plane"></i> Submit Review
        </button>
        <div id="reviewsList" class="mt-4 space-y-2"></div>
      </div>
    </div>
  </div>

  <!-- ===== পেমেন্ট মডাল ===== -->
  <div id="paymentModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[400] hidden">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-8 max-w-lg w-full">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold dark:text-white">Complete Payment</h3>
        <button onclick="closePaymentModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div id="paymentDetails" class="space-y-3 text-sm bg-gray-50 dark:bg-gray-800 p-4 rounded-xl">
        <p class="font-semibold dark:text-white">Send payment to any of these:</p>
        <div id="paymentNumbers" class="space-y-2"></div>
      </div>
      <form id="paymentForm" class="mt-4 space-y-4">
        <div>
          <label class="block text-sm font-semibold dark:text-gray-300">Transaction ID *</label>
          <input type="text" id="transactionId" placeholder="Enter your payment transaction ID" required class="form-input" />
        </div>
        <button type="submit" class="btn-primary w-full justify-center">
          <i class="fas fa-check"></i> Confirm Payment
        </button>
        <div id="paymentError" class="text-red-500 text-sm hidden"></div>
      </form>
    </div>
  </div>

  <!-- ===== অথ মডাল ===== -->
  <div id="authModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 id="authModalTitle" class="text-2xl font-bold dark:text-white">Sign In</h3>
        <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="authForm" class="space-y-4">
        <input type="email" id="authEmail" placeholder="Email" required class="form-input" />
        <div class="relative">
          <input type="password" id="authPassword" placeholder="Password" required class="form-input pr-10" />
          <button type="button" onclick="togglePasswordVisibility('authPassword')" class="absolute right-3 top-3 text-gray-400"><i class="fas fa-eye"></i></button>
        </div>
        <button type="submit" class="btn-primary w-full justify-center">Continue</button>
      </form>
      <div class="mt-4 flex flex-col gap-2">
        <button onclick="window.socialLogin('google')" class="btn-outline w-full justify-center"><i class="fab fa-google"></i> Sign in with Google</button>
        <button onclick="window.socialLogin('github')" class="btn-outline w-full justify-center"><i class="fab fa-github"></i> Sign in with GitHub</button>
      </div>
      <p class="mt-2 text-sm text-center">
        <a href="#" onclick="window.showResetPasswordModal()" class="text-blue-600 hover:underline"><i class="fas fa-key"></i> Forgot Password?</a>
      </p>
      <p class="mt-4 text-sm text-gray-500 dark:text-gray-400 text-center">
        <span id="authToggleText">Don't have an account?</span>
        <a href="#" id="authToggleLink" class="text-blue-600 font-medium">Sign Up</a>
      </p>
      <div id="authError" class="text-red-500 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    // ===== ইমপোর্ট =====
    import { 
      auth, db, collection, doc, getDoc, getDocs, onSnapshot, 
      addDoc, updateDoc, deleteDoc, serverTimestamp, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      onAuthStateChanged, signOut, setDoc, 
      signInWithPopup, googleProvider, githubProvider,
      query, where, increment 
    } from './firebase-config.js';
    import { 
      renderNavbar, renderFooter, updateNavbarAuth, updateCartBadge, 
      renderCartSidebar, setLoading, toggleDarkMode 
    } from './components.js';

    // ===== রেন্ডার =====
    renderNavbar();
    renderFooter();
    renderCartSidebar();
    updateCartBadge();

    // ===== টোস্ট =====
    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 4500);
    };

    // ===== অথ মডাল =====
    let currentAuthMode = 'signin';
    window.openAuthModal = (mode) => {
      currentAuthMode = mode;
      document.getElementById('authModalTitle').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggleText').textContent = mode === 'signin' ? "Don't have an account?" : "Already have an account?";
      document.getElementById('authToggleLink').textContent = mode === 'signin' ? 'Sign Up' : 'Sign In';
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
    };
    window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');

    document.getElementById('authToggleLink').addEventListener('click', (e) => {
      e.preventDefault();
      currentAuthMode = currentAuthMode === 'signin' ? 'signup' : 'signin';
      window.openAuthModal(currentAuthMode);
    });

    window.togglePasswordVisibility = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    window.socialLogin = async (provider) => {
      try {
        let result;
        if (provider === 'google') result = await signInWithPopup(auth, googleProvider);
        else if (provider === 'github') result = await signInWithPopup(auth, githubProvider);
        const user = result.user;
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, 'users', user.uid), {
            email: user.email,
            displayName: user.displayName || user.email.split('@')[0],
            role: 'user',
            createdAt: new Date().toISOString()
          });
        }
        showToast('✅ Signed in with ' + provider, 'success');
        closeAuthModal();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    window.showResetPasswordModal = () => {
      const email = prompt('Enter your email address to reset password:');
      if (!email) return;
      import('./firebase-config.js').then(({ sendPasswordResetEmail }) => {
        sendPasswordResetEmail(auth, email)
          .then(() => alert('✅ Password reset link sent to your email.'))
          .catch((error) => alert('⚠️ ' + error.message));
      });
    };

    const authForm = document.getElementById('authForm');
    const authSubmitBtn = authForm.querySelector('button[type="submit"]');
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const errorDiv = document.getElementById('authError');
      errorDiv.classList.add('hidden');
      setLoading(authSubmitBtn, true, 'Continue');
      try {
        let userCred;
        if (currentAuthMode === 'signin') {
          userCred = await signInWithEmailAndPassword(auth, email, password);
          showToast('✅ Signed in!', 'success');
        } else {
          userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'users', userCred.user.uid), {
            email, displayName: email.split('@')[0], role: 'user', createdAt: new Date().toISOString()
          });
          showToast('✅ Account created!', 'success');
        }
        closeAuthModal();
        authForm.reset();
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + error.message, 'error');
      } finally {
        setLoading(authSubmitBtn, false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      let name = null;
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        name = userDoc.exists() ? userDoc.data().displayName : user.email.split('@')[0];
        // উইশলিস্ট চেক
        checkWishlistStatus();
      }
      updateNavbarAuth(user, name);
    });

    window.handleLogout = async () => {
      await signOut(auth);
      showToast('✅ Logged out', 'success');
    };

    // ================================================================
    // ===== প্রোডাক্ট লজিক =====
    // ================================================================

    let allProducts = [];
    let currentProductId = null;
    let currentProductData = null;
    let wishlistItems = [];

    const grid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const sortFilter = document.getElementById('sortFilter');

    // ===== রেন্ডার প্রোডাক্ট =====
    function renderProducts() {
      let filtered = [...allProducts];
      
      // সার্চ
      const search = searchInput.value.toLowerCase();
      if (search) {
        filtered = filtered.filter(p => 
          p.name.toLowerCase().includes(search) || 
          (p.desc || p.description || '').toLowerCase().includes(search)
        );
      }
      
      // ক্যাটাগরি
      const cat = categoryFilter.value;
      if (cat !== 'all') filtered = filtered.filter(p => p.category === cat);
      
      // সর্ট
      const sort = sortFilter.value;
      if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
      else if (sort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));

      if (filtered.length === 0) {
        grid.innerHTML = `<p class="text-gray-500 dark:text-gray-400 col-span-3 text-center py-10">No products found.</p>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const inWishlist = wishlistItems.includes(p.id);
        const rating = p.averageRating || 0;
        const stock = p.stock !== undefined ? p.stock : 999;
        return `
          <div class="glass-card hover:shadow-xl transition-all duration-300">
            <img src="${p.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                 alt="${p.name}" 
                 class="w-full h-48 object-cover rounded-t-lg mb-3" />
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-xl dark:text-white">${p.name}</h3>
              <button onclick="window.toggleWishlist('${p.id}')" 
                      class="wishlist-btn text-xl ${inWishlist ? 'active' : 'text-gray-300'}"
                      id="wishlist-${p.id}">
                <i class="fas fa-heart"></i>
              </button>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${p.desc || p.description || ''}</p>
            <p class="text-2xl font-bold text-blue-600 dark:text-blue-400 mt-2">$${p.price}</p>
            <div class="mt-1 text-yellow-500 text-sm">${renderStars(rating)} (${p.ratingCount || 0})</div>
            <div class="text-sm ${stock > 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}">
              ${stock > 0 ? `✅ In Stock (${stock})` : '❌ Out of Stock'}
            </div>
            <div class="mt-3 flex flex-wrap gap-2">
              <button onclick="window.openProductDetail('${p.id}')" class="btn-primary text-sm py-2 px-4 flex-1">
                <i class="fas fa-eye"></i> Details
              </button>
              <button onclick="window.addToCart('${p.id}')" class="btn-outline text-sm py-2 px-4">
                <i class="fas fa-cart-plus"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5 ? 1 : 0;
      let s = '';
      for (let i = 0; i < full; i++) s += '★';
      if (half) s += '☆';
      for (let i = 0; i < 5 - full - half; i++) s += '☆';
      return s;
    }

    // ===== প্রোডাক্ট লোড =====
    onSnapshot(collection(db, 'products'), (snapshot) => {
      allProducts = [];
      snapshot.forEach(doc => {
        allProducts.push({ id: doc.id, ...doc.data() });
      });
      renderProducts();
    });

    // ===== ফিল্টার ইভেন্ট =====
    searchInput.addEventListener('input', renderProducts);
    categoryFilter.addEventListener('change', renderProducts);
    sortFilter.addEventListener('change', renderProducts);

    window.resetFilters = () => {
      searchInput.value = '';
      categoryFilter.value = 'all';
      sortFilter.value = 'price-asc';
      renderProducts();
    };

    // ================================================================
    // ===== কার্ট =====
    // ================================================================

    window.addToCart = (productId) => {
      const product = allProducts.find(p => p.id === productId);
      if (!product) { showToast('Product not found', 'error'); return; }
      
      // স্টক চেক
      if (product.stock !== undefined && product.stock <= 0) {
        showToast('❌ Out of stock!', 'error');
        return;
      }

      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({ 
          id: product.id, 
          name: product.name, 
          price: product.price,
          imageUrl: product.imageUrl || '',
          quantity: 1
        });
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartUI();
      showToast(`✅ "${product.name}" added to cart`, 'success');
    };

    // কার্ট UI আপডেট (components.js থেকে কল)
    window.updateCartUI = () => {
      // components.js এর updateCartUI কল
      import('./components.js').then(({ updateCartUI }) => updateCartUI());
      updateCartBadge();
    };

    // ================================================================
    // ===== উইশলিস্ট =====
    // ================================================================

    async function loadWishlist() {
      const user = auth.currentUser;
      if (!user) { wishlistItems = []; return; }
      try {
        const q = query(collection(db, 'wishlist'), where('userId', '==', user.uid));
        const snap = await getDocs(q);
        wishlistItems = snap.docs.map(doc => doc.data().productId);
        renderProducts();
      } catch (err) {
        console.error('Wishlist load error:', err);
      }
    }

    window.toggleWishlist = async (productId) => {
      const user = auth.currentUser;
      if (!user) { showToast('Please sign in to add to wishlist', 'warning'); return; }
      
      const inWishlist = wishlistItems.includes(productId);
      try {
        if (inWishlist) {
          const q = query(collection(db, 'wishlist'), 
            where('userId', '==', user.uid), 
            where('productId', '==', productId)
          );
          const snap = await getDocs(q);
          snap.forEach(doc => deleteDoc(doc.ref));
          wishlistItems = wishlistItems.filter(id => id !== productId);
          showToast('Removed from wishlist', 'success');
        } else {
          await addDoc(collection(db, 'wishlist'), {
            userId: user.uid,
            productId: productId,
            addedAt: serverTimestamp()
          });
          wishlistItems.push(productId);
          showToast('✅ Added to wishlist', 'success');
        }
        renderProducts();
        // ডিটেইল মডালে বাটন আপডেট
        if (currentProductId === productId) {
          updateDetailWishlistBtn(wishlistItems.includes(productId));
        }
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    window.toggleWishlistFromDetail = () => {
      if (currentProductId) window.toggleWishlist(currentProductId);
    };

    function updateDetailWishlistBtn(inWishlist) {
      const btn = document.getElementById('detailWishlistBtn');
      if (btn) {
        btn.innerHTML = `<i class="fas fa-heart"></i> ${inWishlist ? 'Remove from' : 'Add to'} Wishlist`;
        btn.style.color = inWishlist ? '#ef4444' : '';
      }
    }

    async function checkWishlistStatus() {
      await loadWishlist();
    }

    // ================================================================
    // ===== প্রোডাক্ট ডিটেইল =====
    // ================================================================

    window.openProductDetail = async (id) => {
      currentProductId = id;
      const docSnap = await getDoc(doc(db, 'products', id));
      if (!docSnap.exists()) { showToast('Product not found', 'error'); return; }
      currentProductData = { id, ...docSnap.data() };
      const p = currentProductData;

      document.getElementById('detailName').textContent = p.name;
      document.getElementById('detailImage').src = p.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image';
      document.getElementById('detailDesc').textContent = p.desc || p.description || '';
      document.getElementById('detailPrice').textContent = `$${p.price}`;
      const rating = p.averageRating || 0;
      document.getElementById('detailRating').textContent = renderStars(rating) + ` (${p.ratingCount || 0} reviews)`;
      document.getElementById('detailStock').textContent = p.stock !== undefined ? 
        (p.stock > 0 ? `✅ In Stock (${p.stock})` : '❌ Out of Stock') : '✅ In Stock';

      // উইশলিস্ট স্ট্যাটাস
      const inWishlist = wishlistItems.includes(id);
      updateDetailWishlistBtn(inWishlist);

      // রিভিউ লোড
      loadReviews(id);

      document.getElementById('productDetailModal').classList.remove('hidden');
    };

    window.closeDetailModal = () => {
      document.getElementById('productDetailModal').classList.add('hidden');
      currentProductId = null;
      currentProductData = null;
    };

    window.addToCartFromDetail = () => {
      if (currentProductId) window.addToCart(currentProductId);
    };

    window.buyNowFromDetail = () => {
      if (currentProductId) {
        window.addToCart(currentProductId);
        setTimeout(() => window.checkout(), 500);
      }
    };

    // ================================================================
    // ===== রেটিং সিস্টেম =====
    // ================================================================

    let selectedRating = 0;

    document.querySelectorAll('#ratingStars .star').forEach(el => {
      el.addEventListener('click', () => {
        selectedRating = parseInt(el.dataset.val);
        document.querySelectorAll('#ratingStars .star').forEach(s => s.textContent = '☆');
        for (let i = 0; i < selectedRating; i++) {
          document.querySelectorAll('#ratingStars .star')[i].textContent = '★';
        }
      });
    });

    window.submitRating = async () => {
      if (!selectedRating) { showToast('Please select a rating', 'warning'); return; }
      const user = auth.currentUser;
      if (!user) { showToast('Please sign in to rate', 'warning'); return; }
      if (!currentProductId) { showToast('No product selected', 'error'); return; }

      const review = document.getElementById('ratingReview').value.trim();
      
      try {
        // রেটিং সেভ
        await addDoc(collection(db, 'ratings'), {
          productId: currentProductId,
          userId: user.uid,
          userEmail: user.email,
          rating: selectedRating,
          review: review,
          timestamp: serverTimestamp()
        });

        // প্রোডাক্ট আপডেট (এভারেজ রেটিং)
        const productRef = doc(db, 'products', currentProductId);
        const snap = await getDoc(productRef);
        const data = snap.data();
        const count = (data.ratingCount || 0) + 1;
        const avg = ((data.averageRating || 0) * (data.ratingCount || 0) + selectedRating) / count;
        await updateDoc(productRef, { 
          averageRating: avg, 
          ratingCount: count 
        });

        showToast('✅ Review submitted!', 'success');
        selectedRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(s => s.textContent = '☆');
        document.getElementById('ratingReview').value = '';
        
        // রিভিউ রিলোড
        loadReviews(currentProductId);
        renderProducts();
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
      }
    };

    async function loadReviews(productId) {
      const container = document.getElementById('reviewsList');
      try {
        const q = query(collection(db, 'ratings'), where('productId', '==', productId));
        const snap = await getDocs(q);
        if (snap.empty) {
          container.innerHTML = '<p class="text-gray-400 text-sm">No reviews yet.</p>';
          return;
        }
        let html = '';
        snap.forEach(doc => {
          const r = doc.data();
          const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
          html += `
            <div class="border-b dark:border-gray-700 pb-2">
              <div class="flex justify-between">
                <span class="font-semibold dark:text-white">${r.userEmail || 'Anonymous'}</span>
                <span class="text-yellow-500">${stars}</span>
              </div>
              ${r.review ? `<p class="text-sm text-gray-600 dark:text-gray-400">${r.review}</p>` : ''}
              <p class="text-xs text-gray-400">${r.timestamp?.toDate?.()?.toLocaleString() || ''}</p>
            </div>
          `;
        });
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<p class="text-gray-400 text-sm">Error loading reviews.</p>';
      }
    }

    // ================================================================
    // ===== চেকআউট =====
    // ================================================================

    window.checkout = async () => {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) {
        showToast('🛒 Your cart is empty', 'warning');
        return;
      }
      const user = auth.currentUser;
      if (!user) {
        showToast('⚠️ Please sign in to checkout', 'error');
        openAuthModal('signin');
        return;
      }

      const checkoutBtn = document.querySelector('#cartSidebar .btn-primary');
      if (checkoutBtn) setLoading(checkoutBtn, true, 'Proceed to Checkout');

      try {
        // পেমেন্ট সেটিংস লোড
        const settingsSnap = await getDoc(doc(db, 'settings', 'payment'));
        const settings = settingsSnap.exists() ? settingsSnap.data() : {};
        if (!settings.bkash && !settings.nagad && !settings.usdt) {
          showToast('⚠️ Payment methods not set. Contact admin.', 'error');
          if (checkoutBtn) setLoading(checkoutBtn, false);
          return;
        }

        // অর্ডার ক্রিয়েট
        const orderData = {
          userId: user.uid,
          userEmail: user.email,
          items: cart.map(item => ({
            id: item.id,
            name: item.name,
            price: item.price,
            quantity: item.quantity || 1,
            imageUrl: item.imageUrl || ''
          })),
          total: cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0),
          status: 'pending',
          paymentMethod: '',
          transactionId: '',
          createdAt: serverTimestamp()
        };
        const docRef = await addDoc(collection(db, 'orders'), orderData);
        
        // পেমেন্ট মডাল খোলা
        window.openPaymentModal(docRef.id, settings);

        if (checkoutBtn) setLoading(checkoutBtn, false);
      } catch (err) {
        showToast('⚠️ ' + err.message, 'error');
        if (checkoutBtn) setLoading(checkoutBtn, false);
      }
    };

    window.openPaymentModal = (orderId, settings) => {
      const numbersDiv = document.getElementById('paymentNumbers');
      let html = '';
      if (settings.bkash) html += `<p><i class="fas fa-mobile-alt text-blue-500"></i> BKash: <strong>${settings.bkash}</strong></p>`;
      if (settings.nagad) html += `<p><i class="fas fa-mobile-alt text-orange-500"></i> Nagad: <strong>${settings.nagad}</strong></p>`;
      if (settings.usdt) html += `<p><i class="fab fa-bitcoin text-yellow-500"></i> USDT (BEP20): <strong>${settings.usdt}</strong></p>`;
      if (settings.rocket) html += `<p><i class="fas fa-mobile-alt text-red-500"></i> Rocket: <strong>${settings.rocket}</strong></p>`;
      if (!html) html = '<p class="text-gray-500">Payment methods not set. Contact admin.</p>';
      numbersDiv.innerHTML = html;
      document.getElementById('paymentModal').classList.remove('hidden');
      document.getElementById('paymentError').classList.add('hidden');
      document.getElementById('transactionId').value = '';
      document.getElementById('paymentForm').dataset.orderId = orderId;
    };

    window.closePaymentModal = () => {
      document.getElementById('paymentModal').classList.add('hidden');
    };

    const paymentForm = document.getElementById('paymentForm');
    const paySubmitBtn = paymentForm.querySelector('button[type="submit"]');
    paymentForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const txnId = document.getElementById('transactionId').value.trim();
      const errorDiv = document.getElementById('paymentError');
      const orderId = e.target.dataset.orderId;
      errorDiv.classList.add('hidden');

      if (!txnId) {
        errorDiv.textContent = 'Please enter transaction ID.';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (!orderId) {
        errorDiv.textContent = 'Order not found.';
        errorDiv.classList.remove('hidden');
        return;
      }

      setLoading(paySubmitBtn, true, 'Confirm Payment');
      try {
        await updateDoc(doc(db, 'orders', orderId), {
          transactionId: txnId,
          paymentMethod: 'Manual',
          status: 'processing'
        });
        showToast('✅ Payment confirmed! Admin will verify soon.', 'success');
        closePaymentModal();
        localStorage.removeItem('cart');
        window.updateCartUI();
        if (typeof window.toggleCart === 'function') window.toggleCart();
      } catch (err) {
        errorDiv.textContent = '⚠️ ' + err.message;
        errorDiv.classList.remove('hidden');
        showToast('⚠️ ' + err.message, 'error');
      } finally {
        setLoading(paySubmitBtn, false);
      }
    });

    // ================================================================
    // ===== আরও কিছু =====
    // ================================================================

    // ডার্ক মোড টগল
    window.toggleDarkModeGlobal = toggleDarkMode;

    console.log('🚀 SWD Store Loaded Successfully!');
    console.log('📦 Features: Filter, Search, Sort, Wishlist, Ratings, Reviews, Cart, Checkout');

  </script>
</body>
