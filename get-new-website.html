<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get New Website – SWD Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    /* আগের মতো স্টাইল */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #f2f4f7; color: #1c1c1e; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.6); }
    .btn-primary { background: linear-gradient(135deg,#007AFF,#5856D6); color:#fff; padding:12px 28px; border-radius:60px; font-weight:600; border:none; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.35); }
    .gradient-text { background: linear-gradient(135deg,#007AFF,#AF52DE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-link { position:relative; font-weight:500; color:#3a3a3c; transition:0.2s; cursor:pointer; }
    .nav-link:hover { color:#007AFF; }
    .glass-card { background:rgba(255,255,255,0.72); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.7); border-radius:16px; padding:1.5rem; transition:0.3s; }
    .glass-card:hover { transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.06); }
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; background:white; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.1); min-width:200px; padding:8px 0; border:1px solid rgba(0,0,0,0.04); z-index:100; }
    .dropdown-menu a { display:block; padding:10px 20px; color:#1c1c1e; text-decoration:none; font-size:0.9rem; transition:0.2s; }
    .dropdown-menu a:hover { background:#f0f0f5; }
    .dropdown-menu.show { display:block; }
    .profile-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#007AFF,#5856D6); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; }
    .cart-badge { background:#007AFF; color:white; border-radius:50%; padding:2px 8px; font-size:0.7rem; font-weight:700; }
    /* কার্ট সাইডবার */
    .cart-sidebar { position:fixed; right:-400px; top:0; width:380px; height:100%; background:white; box-shadow:-10px 0 40px rgba(0,0,0,0.1); transition:0.4s cubic-bezier(0.25,0.46,0.45,0.94); z-index:200; padding:1.5rem; overflow-y:auto; }
    .cart-sidebar.open { right:0; }
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.2); backdrop-filter:blur(4px); z-index:199; display:none; }
    .cart-overlay.open { display:block; }
  </style>
</head>
<body>

<!-- নেভবার (SWD Store এর মতো) -->
<nav class="fixed top-0 left-0 w-full glass z-50 h-16 md:h-20 flex items-center px-6 sm:px-8 lg:px-12">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <a href="swd-store.html" class="text-xl md:text-2xl font-bold text-gray-900">
      SWD <span class="gradient-text">Store</span>
    </a>
    <div class="flex items-center gap-4">
      <button onclick="toggleCart()" class="relative text-gray-700">
        <i class="fas fa-shopping-cart text-xl"></i>
        <span id="cartCount" class="cart-badge absolute -top-2 -right-3">0</span>
      </button>
      <div id="auth-buttons" class="flex items-center gap-3">
        <a href="#" onclick="openAuthModal('signin')" class="nav-link text-sm">Sign In</a>
        <a href="#" onclick="openAuthModal('signup')" class="btn-primary text-sm py-2 px-5">Get Started</a>
      </div>
      <div id="profile-section" class="relative hidden">
        <div class="profile-avatar" id="profileAvatar">S</div>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="#" onclick="navigateTo('my-profile')"><i class="fas fa-user mr-2"></i> My Profile</a>
          <a href="#" onclick="navigateTo('my-orders')"><i class="fas fa-box mr-2"></i> My Orders</a>
          <a href="#" onclick="navigateTo('settings')"><i class="fas fa-cog mr-2"></i> Settings</a>
          <a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- মূল কন্টেন্ট: পণ্যের তালিকা -->
<section class="pt-24 pb-12 px-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900">Choose Your Website Package</h1>
    <div id="productGrid" class="grid md:grid-cols-3 gap-6 mt-8">
      <!-- ডাইনামিকভাবে JS দিয়ে রেন্ডার করবে -->
    </div>
  </div>
</section>

<!-- কার্ট সাইডবার -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold">Your Cart</h2>
    <button onclick="toggleCart()" class="text-gray-500"><i class="fas fa-times"></i></button>
  </div>
  <div id="cartItems" class="space-y-4"></div>
  <div class="mt-6 border-t pt-4">
    <div class="flex justify-between font-bold">
      <span>Total:</span>
      <span id="cartTotal">$0</span>
    </div>
    <button onclick="checkout()" class="btn-primary w-full mt-4 justify-center">Proceed to Checkout</button>
  </div>
</div>

<!-- অথ মডাল (পূর্বের মতো) -->
<!-- ... অথ মডাল HTML ... (একই) -->

<script type="module">
import { auth, db, collection, doc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, query, where } from './firebase-config.js';

// পণ্য লোড করা
const productGrid = document.getElementById('productGrid');
let products = [];

const loadProducts = () => {
  onSnapshot(collection(db, 'products'), (snapshot) => {
    products = [];
    snapshot.forEach(doc => {
      products.push({ id: doc.id, ...doc.data() });
    });
    renderProducts();
  });
};

const renderProducts = () => {
  productGrid.innerHTML = products.map(p => `
    <div class="glass-card">
      <h3 class="font-bold text-xl">${p.name}</h3>
      <p class="text-sm text-gray-500 mt-1">${p.description || ''}</p>
      <p class="text-2xl font-bold text-blue-600 mt-2">$${p.price}</p>
      <button onclick="addToCart('${p.id}')" class="btn-primary text-sm py-2 px-4 mt-3">Add to Cart</button>
    </div>
  `).join('');
};

loadProducts();

// কার্ট সিস্টেম
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const updateCartUI = () => {
  document.getElementById('cartCount').textContent = cart.length;
  const cartItemsDiv = document.getElementById('cartItems');
  if (cart.length === 0) {
    cartItemsDiv.innerHTML = '<p class="text-gray-500">Your cart is empty.</p>';
    document.getElementById('cartTotal').textContent = '$0';
    return;
  }
  let total = 0;
  cartItemsDiv.innerHTML = cart.map((item, index) => {
    total += item.price;
    return `
      <div class="flex justify-between items-center border-b pb-2">
        <div>
          <span class="font-medium">${item.name}</span>
          <span class="text-sm text-gray-500">$${item.price}</span>
        </div>
        <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
      </div>
    `;
  }).join('');
  document.getElementById('cartTotal').textContent = `$${total}`;
};

window.addToCart = (productId) => {
  const product = products.find(p => p.id === productId);
  if (!product) return;
  cart.push({ id: product.id, name: product.name, price: product.price });
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartUI();
  // অ্যানিমেশন
};

window.removeFromCart = (index) => {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartUI();
};

window.toggleCart = () => {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
};

updateCartUI();

// চেকআউট
window.checkout = () => {
  if (cart.length === 0) {
    alert('Your cart is empty.');
    return;
  }
  // ইউজার চেক
  const user = auth.currentUser;
  if (!user) {
    alert('Please sign in to checkout.');
    openAuthModal('signin');
    return;
  }
  // অর্ডার তৈরি
  const orderData = {
    userId: user.uid,
    items: cart,
    total: cart.reduce((sum, i) => sum + i.price, 0),
    status: 'pending',
    paymentMethod: '',
    transactionId: '',
    createdAt: serverTimestamp(),
  };
  addDoc(collection(db, 'orders'), orderData).then(() => {
    alert('Order placed! Please complete payment.');
    cart = [];
    localStorage.removeItem('cart');
    updateCartUI();
    toggleCart();
  }).catch(err => alert('Error: '+err.message));
};

// Auth functions (পূর্বের মতো)
window.openAuthModal = (mode) => { /* ... */ };
window.closeAuthModal = () => { /* ... */ };
window.handleLogout = async () => { /* ... */ };
// অথ স্টেট মনিটর
import { onAuthStateChanged, signOut } from './firebase-config.js';
onAuthStateChanged(auth, (user) => {
  // আপডেট UI
});
</script>

</body>
</html>
